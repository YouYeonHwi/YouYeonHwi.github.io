<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="google-adsense-account" content="ca-pub-2428685752915797">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2428685752915797" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/games/manifest.json">
  <title>풍선 불기 대결 | 커플 게임 광장</title>
  <meta name="description" content="미친듯이 탭해서 풍선을 불어라! 먼저 터뜨리면 승리 🎈">
  <meta property="og:title" content="🎈 풍선 불기 대결 — 손가락이 불타오른다!">
  <meta property="og:description" content="커플 탭 대결! 빠르게 탭해서 먼저 풍선을 터뜨려라 💨">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --primary-glow: rgba(167,139,250,.35);
      --accent: #f472b6; --bg: #0a0a0f; --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08); --text: #e2e8f0; --text-dim: #64748b; --radius: 20px;
    }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg);
      color: var(--text); overflow: hidden; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .game-wrapper { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot {
      width: 100%; min-height: 50px; background: var(--surface); border: 1px dashed var(--border);
      display: flex; align-items: center; justify-content: center; color: var(--text-dim);
      font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0;
    }
    .player-area {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; position: relative; cursor: pointer; padding: 1rem;
      transition: background .1s;
    }
    .player-area.top { transform: rotate(180deg); background: linear-gradient(135deg, #831843, #4a044e); }
    .player-area.bottom { background: linear-gradient(135deg, #1e1b4b, #0c4a6e); }
    .player-label {
      font-size: .7rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; opacity: .4; position: absolute; bottom: .5rem;
    }
    .balloon-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
    .balloon {
      font-size: 3rem; transition: transform .08s; display: block;
    }
    .progress-bar {
      width: 140px; height: 10px; background: rgba(255,255,255,.1); border-radius: 5px;
      overflow: hidden; margin-top: .75rem;
    }
    .progress-fill {
      height: 100%; border-radius: 5px; transition: width .08s; width: 0%;
    }
    .top .progress-fill { background: linear-gradient(90deg, #f472b6, #ec4899); }
    .bottom .progress-fill { background: linear-gradient(90deg, #a78bfa, #818cf8); }
    .tap-count { font-size: 1.5rem; font-weight: 900; margin-top: .5rem; }

    .divider {
      width: 100%; height: 40px; display: flex; align-items: center; justify-content: center;
      position: relative; flex-shrink: 0; z-index: 10; background: var(--bg);
    }
    .divider::before { content: ''; position: absolute; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
    .vs-badge {
      background: var(--bg); border: 2px solid var(--primary); color: var(--primary);
      font-weight: 900; font-size: .8rem; width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; z-index: 1;
    }

    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,.94); backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 999; padding: 2rem; transition: opacity .3s, visibility .3s;
    }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .overlay h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: .5rem; }
    .overlay p { color: var(--text-dim); text-align: center; max-width: 320px; line-height: 1.5; margin-bottom: 1.5rem; }
    .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .85rem 2rem; border: none; border-radius: 50px; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; text-decoration: none; color: white; transition: transform .15s; }
    .btn:active { transform: scale(.95); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 4px 20px var(--primary-glow); }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); }
    .scoreboard { display: flex; gap: 2.5rem; margin-bottom: 1.5rem; }
    .score-cell { text-align: center; }
    .score-cell .label { font-size: .75rem; color: var(--text-dim); }
    .score-cell .value { font-size: 2.2rem; font-weight: 900; }
    .score-cell.p1 .value { color: var(--accent); }
    .score-cell.p2 .value { color: var(--primary); }
    .penalty-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem 2rem; text-align: center; max-width: 320px; margin-bottom: 1.5rem; animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
    .penalty-card.hidden { display: none; }
    @keyframes popIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .penalty-card .emoji { font-size: 2.5rem; margin-bottom: .5rem; }
    .penalty-card .text { font-size: 1.05rem; line-height: 1.5; }

    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
    .shake { animation: shake .1s; }

    @keyframes explode { 0%{transform:scale(1);opacity:1} 100%{transform:scale(3);opacity:0} }
    .explode { animation: explode .5s forwards; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="player-area top" id="area-p1">
      <div class="balloon-wrap"><span class="balloon" id="balloon-p1">🎈</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-p1"></div></div>
      <div class="tap-count" id="count-p1">0</div>
      <span class="player-label">PLAYER 1</span>
    </div>
    <div class="divider"><div class="vs-badge">VS</div></div>
    <div class="player-area bottom" id="area-p2">
      <div class="balloon-wrap"><span class="balloon" id="balloon-p2">🎈</span></div>
      <div class="progress-bar"><div class="progress-fill" id="prog-p2"></div></div>
      <div class="tap-count" id="count-p2">0</div>
      <span class="player-label">PLAYER 2</span>
    </div>
  </div>

  <div class="overlay" id="overlay-start">
    <h1>🎈 풍선 불기 대결</h1>
    <p>미친듯이 탭해서<br>먼저 풍선을 터뜨리면 승리!<br>30번 탭하면 펑! 💥</p>
    <button class="btn btn-primary" onclick="startGame()">START</button>
    <a href="/games/" class="btn btn-ghost" style="margin-top:.75rem;">← 게임 목록</a>
  </div>

  <div class="overlay hidden" id="overlay-result">
    <h1 id="winner-text">🎉 승리!</h1>
    <div class="scoreboard">
      <div class="score-cell p1"><div class="label">Player 1</div><div class="value" id="score-p1">0</div></div>
      <div class="score-cell p2"><div class="label">Player 2</div><div class="value" id="score-p2">0</div></div>
    </div>
    <div class="penalty-card hidden" id="penalty-card">
      <div class="emoji" id="penalty-emoji">🎰</div>
      <div class="text" id="penalty-text"></div>
    </div>
    <button class="btn btn-primary" onclick="spinPenalty()">🎰 커플 벌칙 룰렛</button>
    <div style="display:flex; gap:.75rem; margin-top:.75rem;">
      <button class="btn btn-ghost" onclick="startGame()">🔄 다시 하기</button>
      <a href="/games/" class="btn btn-ghost">📋 목록</a>
    </div>
  </div>

  <script src="/games/common.js"></script>
  <script>
    const GAME_ID = 'balloon';
    const TARGET = 30;
    let p1Count = 0, p2Count = 0, playing = false;

    function startGame() {
      p1Count = 0; p2Count = 0; playing = true;
      document.getElementById('overlay-start').classList.add('hidden');
      document.getElementById('overlay-result').classList.add('hidden');
      document.getElementById('penalty-card').classList.add('hidden');
      updateUI();
      document.getElementById('balloon-p1').className = 'balloon';
      document.getElementById('balloon-p2').className = 'balloon';
      document.getElementById('balloon-p1').textContent = '🎈';
      document.getElementById('balloon-p2').textContent = '🎈';
    }

    function tap(player) {
      if (!playing) return;
      GameUtils.vibrate(10);
      if (player === 1) {
        p1Count++;
        const b = document.getElementById('balloon-p1');
        b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake');
        if (p1Count >= TARGET) win(1);
      } else {
        p2Count++;
        const b = document.getElementById('balloon-p2');
        b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake');
        if (p2Count >= TARGET) win(2);
      }
      updateUI();
    }

    function updateUI() {
      document.getElementById('count-p1').textContent = p1Count;
      document.getElementById('count-p2').textContent = p2Count;
      document.getElementById('prog-p1').style.width = `${(p1Count/TARGET)*100}%`;
      document.getElementById('prog-p2').style.width = `${(p2Count/TARGET)*100}%`;
      const scale1 = 1 + (p1Count/TARGET) * 1.5;
      const scale2 = 1 + (p2Count/TARGET) * 1.5;
      document.getElementById('balloon-p1').style.transform = `scale(${scale1})`;
      document.getElementById('balloon-p2').style.transform = `scale(${scale2})`;
    }

    function win(player) {
      playing = false;
      GameUtils.vibrate(100);
      const balloon = document.getElementById(player === 1 ? 'balloon-p1' : 'balloon-p2');
      balloon.textContent = '💥';
      balloon.classList.add('explode');
      const scores = GameUtils.getScores(GAME_ID);
      if (player === 1) scores.p1++; else scores.p2++;
      GameUtils.saveScores(GAME_ID, scores);
      setTimeout(() => {
        document.getElementById('score-p1').textContent = scores.p1;
        document.getElementById('score-p2').textContent = scores.p2;
        document.getElementById('winner-text').textContent = `🎉 Player ${player} 승리!`;
        document.getElementById('overlay-result').classList.remove('hidden');
      }, 700);
    }

    function spinPenalty() {
      const p = GameUtils.spinPenalty();
      document.getElementById('penalty-emoji').textContent = p.slice(0, 2);
      document.getElementById('penalty-text').textContent = p;
      const card = document.getElementById('penalty-card');
      card.classList.remove('hidden'); card.style.animation = 'none'; void card.offsetWidth; card.style.animation = '';
      GameUtils.vibrate(50);
    }

    document.getElementById('area-p1').addEventListener('touchstart', e => { e.preventDefault(); tap(1); });
    document.getElementById('area-p2').addEventListener('touchstart', e => { e.preventDefault(); tap(2); });
    document.getElementById('area-p1').addEventListener('mousedown', e => { e.preventDefault(); tap(1); });
    document.getElementById('area-p2').addEventListener('mousedown', e => { e.preventDefault(); tap(2); });
  </script>
</body>
</html>
