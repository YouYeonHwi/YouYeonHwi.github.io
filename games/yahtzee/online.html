<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="google-adsense-account" content="ca-pub-2428685752915797">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/games/manifest.json">

  <title>커플 야추 (원격) | 커플 게임 광장</title>
  <meta name="description" content="멀리 떨어져 있어도 함께 즐기는 3D 야추 대결! 🎲">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --primary-glow: rgba(167,139,250,.35);
      --accent: #f472b6; --accent-glow: rgba(244,114,182,.3);
      --bg: #0a0a0f; --surface: rgba(255,255,255,.04);
      --surface-hover: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.08); --text: #e2e8f0; --text-dim: #64748b;
      --radius: 16px;
      --p1: #f472b6; --p2: #a78bfa;
    }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg);
      color: var(--text); overflow-x: hidden; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .game-container { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
    .ad-slot { width: 100%; min-height: 50px; background: var(--surface); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }
    
    .top-bar { display: flex; align-items: center; justify-content: space-between; padding: .6rem 1rem; flex-shrink: 0; }
    .turn-indicator { font-size: .85rem; font-weight: 700; padding: .35rem .9rem; border-radius: 50px; transition: all .3s; border: 1px solid transparent; }
    .turn-indicator.active { background: rgba(167,139,250,.15); color: var(--primary); border-color: var(--primary-glow); box-shadow: 0 0 10px var(--primary-glow); }
    .mini-scores { display: flex; gap: 1rem; font-size: .8rem; font-weight: 700; }
    .ms-p1 { color: var(--p1); } .ms-p2 { color: var(--p2); }
    .back-link { color: var(--text-dim); text-decoration: none; font-size: .75rem; font-weight: 600; }

    .dice-section { padding: .5rem 1rem; text-align: center; flex-shrink: 0; }
    .dice-row { display: flex; justify-content: center; gap: 14px; margin-bottom: 2rem; padding-top: 1rem; perspective: 800px; }
    .die-scene { width: 50px; height: 50px; position: relative; cursor: pointer; transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); transform-style: preserve-3d; }
    .die-scene.held::after { content: 'HOLD'; position: absolute; bottom: -22px; left: 0; width: 100%; text-align: center; font-size: .65rem; font-weight: 800; color: #4ade80; text-shadow: 0 0 8px rgba(74,222,128,.5); }
    .die-cube { width: 100%; height: 100%; position: absolute; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.15, 0.85, 0.2, 1); }
    .die-face { position: absolute; width: 50px; height: 50px; background: linear-gradient(135deg, #f8fafc, #cbd5e1); border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; display: grid; padding: 6px; gap: 2px; grid-template-areas: "a . c" "e g f" "d . b"; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr 1fr; }
    .die-scene.held .die-face { background: linear-gradient(135deg, #dcfce7, #86efac); border-color: #22c55e; }
    .die-face.front { transform: rotateY(0deg) translateZ(25px); } .die-face.right { transform: rotateY(90deg) translateZ(25px); } .die-face.back { transform: rotateY(180deg) translateZ(25px); } .die-face.left { transform: rotateY(-90deg) translateZ(25px); } .die-face.top { transform: rotateX(90deg) translateZ(25px); } .die-face.bottom { transform: rotateX(-90deg) translateZ(25px); }
    .dot { background: #1e293b; border-radius: 50%; width: 100%; height: 100%; }
    .face-1 .dot:nth-child(1) { grid-area: g; }
    .face-2 .dot:nth-child(1) { grid-area: a; } .face-2 .dot:nth-child(2) { grid-area: b; }
    .face-3 .dot:nth-child(1) { grid-area: a; } .face-3 .dot:nth-child(2) { grid-area: g; } .face-3 .dot:nth-child(3) { grid-area: b; }
    .face-4 .dot:nth-child(1) { grid-area: a; } .face-4 .dot:nth-child(2) { grid-area: c; } .face-4 .dot:nth-child(3) { grid-area: d; } .face-4 .dot:nth-child(4) { grid-area: b; }
    .face-5 .dot:nth-child(1) { grid-area: a; } .face-5 .dot:nth-child(2) { grid-area: c; } .face-5 .dot:nth-child(3) { grid-area: d; } .face-5 .dot:nth-child(4) { grid-area: b; } .face-5 .dot:nth-child(5) { grid-area: g; }
    .face-6 .dot:nth-child(1) { grid-area: a; } .face-6 .dot:nth-child(2) { grid-area: c; } .face-6 .dot:nth-child(3) { grid-area: e; } .face-6 .dot:nth-child(4) { grid-area: f; } .face-6 .dot:nth-child(5) { grid-area: d; } .face-6 .dot:nth-child(6) { grid-area: b; }

    .roll-area { display: flex; align-items: center; justify-content: center; gap: .8rem; }
    .btn-roll { padding: .6rem 2rem; border-radius: 50px; border: none; font-family: inherit; font-weight: 700; font-size: .95rem; cursor: pointer; color: white; background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 4px 16px var(--primary-glow); }
    .btn-roll:disabled { opacity: .4; filter: grayscale(1); }

    .score-section { flex: 1; overflow-y: auto; padding: .5rem .75rem; }
    .score-table { width: 100%; border-collapse: collapse; font-size: .72rem; }
    .score-table th { padding: .35rem .3rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
    .score-table td { padding: .35rem .3rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,.03); }
    .score-table td:first-child { text-align: left; font-weight: 600; }
    .score-cell.available { cursor: pointer; color: #4ade80; background: rgba(74,222,128,.06); border-radius: 6px; }
    .score-cell.zero-available { cursor: pointer; color: #ef4444; opacity: .6; }
    .score-cell.filled { font-weight: 700; color: white; }

    .overlay { position: fixed; inset: 0; background: rgba(10,10,15,.96); backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; padding: 2rem; }
    .overlay.hidden { display: none; }
    .overlay h1 { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .status-badge { font-size: .65rem; background: var(--surface); padding: .2rem .6rem; border-radius: 50px; color: var(--text-dim); border: 1px solid var(--border); }
  </style>
</head>
<body>

  <div class="game-container">
    <div class="ad-slot">AD · TOP</div>

    <div class="top-bar">
      <a href="index.html" class="back-link">← 로비</a>
      <div class="turn-indicator active" id="turn-indicator">연결 중...</div>
      <div class="mini-scores">
        <span class="ms-p1" id="mini-p1">P1: 0</span>
        <span class="ms-p2" id="mini-p2">P2: 0</span>
      </div>
    </div>

    <div class="dice-section">
      <div class="dice-row" id="dice-row"></div>
      <div class="roll-area">
        <button class="btn-roll" id="btn-roll" disabled>연결 중...</button>
        <span class="rolls-left" id="rolls-left">3회 남음</span>
      </div>
    </div>

    <div class="score-section">
      <table class="score-table">
        <thead>
          <tr><th>조합</th><th style="color:var(--p1)">P1 (Host)</th><th style="color:var(--p2)">P2 (Guest)</th></tr>
        </thead>
        <tbody id="score-body">
            <!-- JS Injection -->
            <tr id="row-ones"><td>1️⃣ Ones</td><td class="score-cell" id="cell-ones-1">-</td><td class="score-cell" id="cell-ones-2">-</td></tr>
            <tr id="row-twos"><td>2️⃣ Twos</td><td class="score-cell" id="cell-twos-1">-</td><td class="score-cell" id="cell-twos-2">-</td></tr>
            <tr id="row-threes"><td>3️⃣ Threes</td><td class="score-cell" id="cell-threes-1">-</td><td class="score-cell" id="cell-threes-2">-</td></tr>
            <tr id="row-fours"><td>4️⃣ Fours</td><td class="score-cell" id="cell-fours-1">-</td><td class="score-cell" id="cell-fours-2">-</td></tr>
            <tr id="row-fives"><td>5️⃣ Fives</td><td class="score-cell" id="cell-fives-1">-</td><td class="score-cell" id="cell-fives-2">-</td></tr>
            <tr id="row-sixes"><td>6️⃣ Sixes</td><td class="score-cell" id="cell-sixes-1">-</td><td class="score-cell" id="cell-sixes-2">-</td></tr>
            <tr style="background:rgba(255,255,255,0.02)"><td colspan="3" style="font-size:0.6rem; text-align:center">LOWER SECTION</td></tr>
            <tr id="row-threeKind"><td>🎯 3 of Kind</td><td class="score-cell" id="cell-threeKind-1">-</td><td class="score-cell" id="cell-threeKind-2">-</td></tr>
            <tr id="row-fourKind"><td>💎 4 of Kind</td><td class="score-cell" id="cell-fourKind-1">-</td><td class="score-cell" id="cell-fourKind-2">-</td></tr>
            <tr id="row-fullHouse"><td>🏠 Full House</td><td class="score-cell" id="cell-fullHouse-1">-</td><td class="score-cell" id="cell-fullHouse-2">-</td></tr>
            <tr id="row-smStr"><td>📏 S.Straight</td><td class="score-cell" id="cell-smStr-1">-</td><td class="score-cell" id="cell-smStr-2">-</td></tr>
            <tr id="row-lgStr"><td>📐 L.Straight</td><td class="score-cell" id="cell-lgStr-1">-</td><td class="score-cell" id="cell-lgStr-2">-</td></tr>
            <tr id="row-yahtzee"><td>🎲 YAHTZEE</td><td class="score-cell" id="cell-yahtzee-1">-</td><td class="score-cell" id="cell-yahtzee-2">-</td></tr>
            <tr id="row-chance"><td>🃏 Chance</td><td class="score-cell" id="cell-chance-1">-</td><td class="score-cell" id="cell-chance-2">-</td></tr>
        </tbody>
      </table>
    </div>

    <div class="ad-slot">AD · BOTTOM</div>
  </div>

  <!-- ROOM OVERLAY (공통 엔진에 의해 동적으로 주입됨) -->

  <!-- RESULT OVERLAY -->
  <div class="overlay hidden" id="overlay-result">
    <h1 id="winner-text">승리!</h1>
    <div id="final-scores"></div>
    <button class="btn btn-primary" onclick="location.reload()">🔄 다시 하기 (방 나가기)</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common.js"></script>
  <script src="online.js"></script>
</body>
</html>
