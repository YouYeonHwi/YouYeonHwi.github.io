<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>사이버 장기 온라인 | 커플 게임 광장</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;900&display=swap" rel="stylesheet">

  <style>
    /* index.html과 동일한 스타일 적용 (온라인 고유 부분만 추가/수정) */
    :root {
      --primary:      #a78bfa;
      --primary-glow: rgba(167,139,250,.35);
      --accent:       #f472b6;
      --accent-glow:  rgba(244,114,182,.3);
      --green:        #4ade80;
      --red:          #ef4444;
      --bg:           #0a0a0f;
      --surface:      rgba(255,255,255,.04);
      --surface2:     rgba(255,255,255,.07);
      --border:       rgba(255,255,255,.08);
      --text:         #e2e8f0;
      --text-dim:     #64748b;
      --p1:           #ef4444; /* Player 1 (Han): Red */
      --p2:           #4ade80; /* Player 2 (Cho): Green */
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; touch-action: none;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .hidden { display: none !important; }

    /* ════════════ OVERLAY & LOBBY ════════════ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,10,15,.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 200; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem; transition: opacity .3s ease;
      overflow-y: auto; text-align: center;
    }

    .overlay-logo {
      font-size: 2.8rem; font-weight: 900;
      background: linear-gradient(135deg, var(--p1), var(--p2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: .25rem; letter-spacing: -.02em;
    }
    .overlay-sub { color: var(--text-dim); font-size: .85rem; margin-bottom: 2rem; }

    .lobby-card {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem; width: 100%; max-width: 320px;
      margin-bottom: 2rem; position: relative; overflow: hidden;
    }
    .lobby-card h3 { font-size: 1.2rem; margin-bottom: 1rem; color: #fff; }
    .room-code-display { font-size: 2.8rem; font-weight: 900; color: var(--primary); letter-spacing: 4px; margin-bottom: .5rem; }
    .code-hint { font-size: .8rem; color: var(--text-dim); margin-bottom: 1.5rem; }
    
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--p2); box-shadow: 0 0 10px var(--p2); animation: pulse 1.5s infinite; margin-right: 5px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    .input-field {
      width: 100%; padding: 1rem; border-radius: 12px; border: 1px solid var(--border);
      background: rgba(0,0,0,0.3); color: white; font-family: inherit; font-size: 1.2rem;
      text-align: center; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px;
    }
    .input-field:focus { outline: none; border-color: var(--primary); }

    .menu-group { display: flex; flex-direction: column; gap: .75rem; width: 100%; max-width: 300px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      padding: .9rem 1.5rem; border-radius: 50px;
      border: none; font-family: inherit; font-weight: 700; font-size: .95rem;
      cursor: pointer; text-decoration: none;
      transition: transform .15s, box-shadow .15s;
    }
    .btn:active:not(:disabled) { transform: scale(.94) !important; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; box-shadow: 0 4px 20px rgba(255,255,255,0.1); }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

    /* ════════════ GAME SCREEN ════════════ */
    #game-screen {
      height: 100dvh; display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      position: relative;
    }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: .6rem 1rem; flex-shrink: 0;
    }
    .back-btn {
      color: var(--text-dim); font-size: .8rem; font-weight: 600;
      cursor: pointer; padding: .3rem .5rem; border-radius: 8px;
      border: 1px solid var(--border); background: none; text-decoration: none;
    }
    .turn-indicator { 
      font-size: .85rem; font-weight: 800; padding: .4rem 1.2rem; border-radius: 50px; 
      transition: all 0.3s; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-dim);
    }
    .turn-indicator.active.p1 { 
      background: rgba(239, 68, 68, 0.15); color: var(--p1); 
      border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); 
    }
    .turn-indicator.active.p2 { 
      background: rgba(74, 222, 128, 0.15); color: var(--p2); 
      border-color: rgba(74, 222, 128, 0.4); box-shadow: 0 0 15px rgba(74, 222, 128, 0.3); 
    }

    /* Play Area (Board) */
    .play-area {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0.5rem; overflow: hidden; position: relative;
    }

    #board-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 9/10;
      background: rgba(20, 20, 30, .9);
      border-radius: 8px;
    }

    #board-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #pieces-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
    }

    .grid-intersection {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 8%; height: 8%;
      border-radius: 50%;
      z-index: 15;
    }
    .grid-intersection.valid-move {
      background: radial-gradient(circle, rgba(255,255,255,0.8) 20%, transparent 25%);
      cursor: pointer;
    }
    .grid-intersection.valid-capture {
      background: radial-gradient(circle, transparent 35%, rgba(239,68,68,0.8) 40%, rgba(239,68,68,0.8) 45%, transparent 50%);
      cursor: pointer;
    }

    .janggi-piece {
      position: absolute;
      transform: translate(-50%, -50%);
      width: clamp(24px, calc(100% / 9 * 0.85), 60px);
      height: clamp(24px, calc(100% / 10 * 0.85), 60px);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Noto Serif KR', serif; font-weight: 900;
      font-size: clamp(1rem, 4vw, 2rem);
      background: rgba(20,20,25,0.9);
      border-radius: 12px;
      clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: top 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), left 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.1s;
      z-index: 25;
      user-select: none;
    }

    .janggi-piece.selected {
      transform: translate(-50%, -50%) scale(1.15) !important;
      z-index: 30;
    }

    .janggi-piece[data-player="p1"] {
      color: var(--p1);
      border: 2px solid rgba(239, 68, 68, 0.6);
      text-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
    }
    .janggi-piece[data-player="p2"] {
      color: var(--p2);
      border: 2px solid rgba(74, 222, 128, 0.6);
      text-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
    }
    
    .janggi-piece[data-player="p1"].selected { box-shadow: 0 0 20px rgba(239, 68, 68, 0.8); }
    .janggi-piece[data-player="p2"].selected { box-shadow: 0 0 20px rgba(74, 222, 128, 0.8); }
    
    .janggi-piece.king {
      font-size: clamp(1.2rem, 5vw, 2.5rem);
    }

    .bottom-status {
      text-align: center; color: var(--text-dim); font-size: .85rem; padding: 1rem; flex-shrink:0;
    }

    /* Result Overlay */
    .result-badge { font-size: 3rem; margin-bottom: .5rem; }
    .result-title { font-size: 2.2rem; font-weight: 900; margin-bottom: .25rem; color: #fff; }

    /* Check Effect Animation */
    #check-effect {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(2);
      font-size: 4rem; font-weight: 900;
      color: #ef4444; text-shadow: 0 0 30px #ef4444, 0 0 10px #fff;
      pointer-events: none; opacity: 0; z-index: 100;
      font-family: 'Noto Serif KR', serif;
    }
    @keyframes checkAnim {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
      15% { opacity: 1; transform: translate(-50%, -50%) scale(0.9); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }
    @keyframes shakeScreen {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
  </style>

  <!-- Firebase 및 공통 모듈 -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="/games/firebase-config.js"></script>
  <script src="/games/common.js"></script>
</head>
<body>

<!-- ═══ LOBBY OVERLAY ═══ -->
<div id="overlay-lobby" class="overlay">
  <div class="overlay-logo">사이버 장기</div>
  <div class="overlay-sub" style="margin-bottom:0.5rem">온라인으로 친구와 실시간 대결을 펼치세요!</div>

  <!-- 방 생성 후 화면 -->
  <div class="lobby-card hidden" id="card-create">
    <h3>🏠 방 생성됨</h3>
    <div class="room-code-display" id="room-code-display">—</div>
    <div class="code-hint">이 코드를 친구에게 알려주세요<br>친구가 참여하면 자동으로 시작됩니다</div>
    <div style="text-align:left; font-size:.75rem; color:var(--text-dim);">
      <span class="status-dot" id="opp-status-dot"></span>
      <span id="opp-status-text">상대방 기다리는 중...</span>
    </div>
  </div>

  <!-- 방 참여 폼 화면 -->
  <div class="lobby-card" id="card-join">
    <h3>🔑 방 참여</h3>
    <input class="input-field" id="join-code-input" type="text" maxlength="4" placeholder="ABCD" autocomplete="off" spellcheck="false" autocorrect="off">
  </div>

  <div class="menu-group">
    <button id="btn-create" class="btn btn-primary">🏠 방 만들기</button>
    <button id="btn-join"   class="btn btn-primary">🔑 방 참여하기</button>
    <a href="index.html" class="btn btn-ghost" id="btn-lobby-back">← 돌아가기</a>
  </div>
</div>

<!-- ═══ RESULT OVERLAY ═══ -->
<div id="overlay-result" class="overlay hidden">
  <div class="result-badge" id="res-emoji">🏆</div>
  <div class="result-title" id="res-title">승리!</div>
  <div class="result-sub" id="res-sub">게임이 종료되었습니다.</div>
  <div class="menu-group" style="margin-top:1.5rem;">
    <button id="btn-lobby" class="btn btn-primary">🔄 대기실로 이동</button>
  </div>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="hidden">
  <div class="top-bar">
    <a href="#" id="btn-quit" class="back-btn">← 나가기</a>
    <div id="turn-p2" class="turn-indicator p2">초 (Cho) - <span id="label-p2"></span></div>
    <div style="font-weight:900; font-size:.8rem; color:var(--surface2);">VS</div>
    <div id="turn-p1" class="turn-indicator p1 active">한 (Han) - <span id="label-p1"></span></div>
  </div>

  <div class="play-area" id="play-area">
    <div id="board-container">
      <svg id="board-svg" viewBox="0 0 80 90" preserveAspectRatio="none"></svg>
      <div id="pieces-layer"></div>
    </div>
    <div id="check-effect">장군!</div>
  </div>

  <div class="bottom-status" id="status-text">
    대기 중...
  </div>
</div>

<script src="janggi-core.js"></script>
<script>
(() => {
  const GAME_ID = 'janggi';
  const $ = id => document.getElementById(id);
  
  const overlayLobby  = $('overlay-lobby');
  const overlayResult = $('overlay-result');
  const gameScreen    = $('game-screen');
  
  const statusText = $('status-text');

  let game = null;
  let myRole = null; // 'p1' (Host) or 'p2' (Guest)
  let gameActive = false;
  let preventNextSync = false;

  // Initialize DB Connection
  GameUtils.RemoteManager.init(GAME_ID, onRemoteSync);

  /* ════════════ LOBBY ════════════ */
  $('btn-create').addEventListener('click', doCreate);
  $('btn-join').addEventListener('click', doJoin);

  function doCreate() {
    const btn = $('btn-create');
    btn.disabled = true;
    const oldText = btn.textContent;
    btn.textContent = '방 생성 중...';

    const initState = {
      boardState: null, // Will be set initialized by p1 later or we can compute it now
      currentTurn: 'p1',
      winner: null,
      gameOver: false,
      lastMove: null
    };

    GameUtils.RemoteManager.createRoom(initState, (roomCode) => {
      myRole = 'p1';
      $('card-join').style.display   = 'none';
      $('card-create').classList.remove('hidden');
      $('room-code-display').textContent = roomCode;
      $('btn-create').style.display  = 'none';
      $('btn-join').style.display    = 'none';

      const fakeOverlay = document.createElement('div');
      GameUtils.RemoteManager.monitorStatus(
        fakeOverlay, $('card-create'), $('card-create'), $('card-create'),
        () => {
          GameUtils.RemoteManager.updateField('../status', 'playing');
          setTimeout(() => launchGame('p1'), 1000);
        }
      );
    }, (err) => {
      btn.disabled = false;
      btn.textContent = oldText;
      alert('방 생성 실패: ' + (err?.message || err));
    });
  }

  function doJoin() {
    const code = $('join-code-input').value.trim().toUpperCase();
    if (code.length < 4) { alert('4자리 코드를 입력하세요.'); return; }

    const btn = $('btn-join');
    btn.disabled = true;
    const oldText = btn.textContent;
    btn.textContent = '참여 중...';

    GameUtils.RemoteManager.joinRoom(code, () => {
      myRole = 'p2';
      const fakeOverlay = document.createElement('div');
      GameUtils.RemoteManager.monitorStatus(
        fakeOverlay, $('card-join'), $('card-join'), $('card-join'),
        () => launchGame('p2')
      );
    }, (err) => {
      btn.disabled = false;
      btn.textContent = oldText;
      alert('방을 찾을 수 없습니다: ' + (err?.message || err || '코드를 확인하세요.'));
    });
  }

  /* ════════════ GAME LAUNCH ════════════ */
  function launchGame(role) {
    overlayLobby.classList.add('hidden');
    gameScreen.classList.remove('hidden');

    myRole = role;
    $('label-p1').textContent = role === 'p1' ? '나' : '상대';
    $('label-p2').textContent = role === 'p2' ? '나' : '상대';

    gameActive = true;

    // Destroy existing game if any
    if (game) { game.destroy(); game = null; }

    game = new JanggiGame({
      containerId: 'pieces-layer',
      svgId: 'board-svg',
      onTurnChange: (turn, inCheck) => {
        if (turn === 'p1') {
          $('turn-p1').classList.add('active');
          $('turn-p2').classList.remove('active');
        } else {
          $('turn-p2').classList.add('active');
          $('turn-p1').classList.remove('active');
        }
        
        let txt = turn === 'p1' ? '한(Han) 님의 차례입니다.' : '초(Cho) 님의 차례입니다.';
        if (inCheck) txt = '장군! ' + (turn === 'p1' ? '한(Han)' : '초(Cho)') + '님이 피해야 합니다.';
        statusText.textContent = txt;
        
        // 동기화 루프가 아닌 내가 직접 조작한 턴 변경이라면 Firebase 업데이트
        if (!preventNextSync) {
          GameUtils.RemoteManager.updateState({
            boardState: game.serializeBoard(),
            currentTurn: turn,
            gameOver: false,
            winner: null,
            lastMove: game.lastMove
          });
        }
      },
      onWin: (winnerRole, reason) => {
        if (!preventNextSync) {
          GameUtils.RemoteManager.updateState({
            boardState: game.serializeBoard(),
            currentTurn: game.currentTurn,
            gameOver: true,
            winner: winnerRole,
            lastMove: game.lastMove
          });
        }
        showResult(winnerRole, reason);
      },
      readOnly: true, // Will conditionally unlock below
      myRole: myRole
    });

    // p1 starts first, if role matches, unlock board
    game.setReadOnly(myRole !== game.currentTurn);

    // Set initial state correctly if P1
    if (myRole === 'p1') {
      GameUtils.RemoteManager.updateState({
        boardState: game.serializeBoard(),
        currentTurn: 'p1',
        gameOver: false,
        winner: null,
        lastMove: null
      });
    }
  }

  function onRemoteSync(state) {
    if (!state || !gameActive || !game) return;

    if (state.boardState) {
      preventNextSync = true; // Prevent echo back
      game.deserializeBoard(state.boardState);
      game.updateLastMoveIndicator(state.lastMove);
      game.checkGameState(state.currentTurn); // Re-evaluates check and turn changes
      preventNextSync = false;
    }

    if (state.gameOver) {
      gameActive = false;
      game.setReadOnly(true);
      if (document.getElementById('overlay-result').classList.contains('hidden')) {
        showResult(state.winner, '상대방이 패배했습니다.');
      }
      return;
    }

    // Set interactive mode based on turn
    game.setReadOnly(state.currentTurn !== myRole);
  }

  function showResult(winnerRole, reason) {
    setTimeout(() => {
      overlayResult.classList.remove('hidden');
      const isMe = winnerRole === myRole;
      $('res-emoji').textContent = isMe ? '🏆' : '💀';
      $('res-title').textContent = isMe ? '다시는 날 이길 순 없다!' : '아쉽네요, 패배했습니다.';
      $('res-sub').textContent = reason || '외통수입니다.';
    }, 1000);
  }

  $('btn-quit').addEventListener('click', () => {
    if (confirm('방을 나가시겠습니까?')) {
      GameUtils.RemoteManager.leaveRoom();
      location.href = 'index.html';
    }
  });

  $('btn-lobby').addEventListener('click', () => {
    GameUtils.RemoteManager.leaveRoom();
    location.reload();
  });
})();
</script>
</body>
</html>
