<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/games/manifest.json">

  <title>풍선 터뜨리기 | 커플 게임 광장</title>
  <meta name="description" content="15초 안에 풍선을 최대한 많이 터뜨려라! 🎈">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --primary-glow: rgba(167,139,250,.35);
      --accent: #f472b6; --accent-glow: rgba(244,114,182,.3);
      --bg: #0a0a0f; --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08); --text: #e2e8f0; --text-dim: #64748b;
      --radius: 20px;
    }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg);
      color: var(--text); overflow: hidden; touch-action: manipulation;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .game-wrapper { display: flex; flex-direction: column; height: 100dvh; }

    .ad-slot {
      width: 100%; min-height: 50px; background: var(--surface);
      border: 1px dashed var(--border); display: flex; align-items: center;
      justify-content: center; color: var(--text-dim); font-size: .6rem;
      letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0;
    }

    .player-area {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; position: relative; overflow: hidden;
    }
    .player-area.top { transform: rotate(180deg); background: linear-gradient(135deg, #831843, #4a044e); }
    .player-area.bottom { background: linear-gradient(135deg, #1e1b4b, #0c4a6e); }

    .player-label {
      font-size: .65rem; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase; opacity: .4; position: absolute; bottom: .3rem;
    }

    .player-hud {
      position: absolute; top: .5rem; left: 0; right: 0;
      display: flex; justify-content: space-between; padding: 0 .8rem;
      font-weight: 700; font-size: .85rem; z-index: 5;
    }

    .balloon-area {
      position: absolute; inset: 0; z-index: 1;
    }

    .balloon {
      position: absolute; font-size: 2.2rem; cursor: pointer;
      animation: floatUp 1.8s ease-in forwards;
      transition: transform .1s;
    }
    .balloon:active { transform: scale(1.3); }

    @keyframes floatUp {
      0% { opacity: 1; }
      85% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-30px); }
    }

    .pop-effect {
      position: absolute; font-size: 1.5rem; pointer-events: none;
      animation: popAnim .4s ease-out forwards;
    }

    @keyframes popAnim {
      0% { transform: scale(.5); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .timer-bar {
      position: absolute; bottom: 0; left: 0; height: 4px;
      background: linear-gradient(90deg, #4ade80, #22d3ee);
      z-index: 10; transition: width .1s linear;
    }

    .divider {
      width: 100%; height: 40px; display: flex; align-items: center;
      justify-content: center; position: relative; flex-shrink: 0; z-index: 10; background: var(--bg);
    }
    .divider::before {
      content: ''; position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }
    .vs-badge {
      background: var(--bg); border: 2px solid var(--primary); color: var(--primary);
      font-weight: 900; font-size: .8rem; width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; z-index: 1;
      box-shadow: 0 0 16px var(--primary-glow);
    }

    /* Overlays */
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,.94);
      backdrop-filter: blur(12px); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 999; padding: 2rem;
      transition: opacity .3s, visibility .3s;
    }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .overlay h1 {
      font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: .5rem;
    }
    .overlay p { color: var(--text-dim); text-align: center; max-width: 320px; line-height: 1.5; margin-bottom: 1.5rem; }

    .btn {
      display: inline-flex; align-items: center; gap: .5rem; padding: .85rem 2rem;
      border: none; border-radius: 50px; font-family: inherit; font-weight: 700;
      font-size: 1rem; cursor: pointer; text-decoration: none; color: white; transition: transform .15s;
    }
    .btn:active { transform: scale(.95); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 4px 20px var(--primary-glow); }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); }

    .scoreboard { display: flex; gap: 2.5rem; margin-bottom: 1.5rem; }
    .score-cell { text-align: center; }
    .score-cell .label { font-size: .75rem; color: var(--text-dim); }
    .score-cell .value { font-size: 2.2rem; font-weight: 900; }
    .score-cell.p1 .value { color: var(--accent); }
    .score-cell.p2 .value { color: var(--primary); }

    .penalty-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem 2rem; text-align: center; max-width: 320px; margin-bottom: 1.5rem;
      animation: popIn .4s cubic-bezier(.175,.885,.32,1.275);
    }
    .penalty-card.hidden { display: none; }
    @keyframes popIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .penalty-card .emoji { font-size: 2.5rem; margin-bottom: .5rem; }
    .penalty-card .text  { font-size: 1.05rem; line-height: 1.5; }

    .countdown-overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,.8);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      transition: opacity .3s, visibility .3s;
    }
    .countdown-overlay.hidden { opacity: 0; visibility: hidden; }
    .countdown-num {
      font-size: 5rem; font-weight: 900; color: var(--primary);
      animation: pulse .5s ease-in-out;
    }
    @keyframes pulse { 0% { transform: scale(1.4); opacity: .5; } 100% { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="ad-slot">AD · 상단 광고</div>

    <div class="player-area top" id="area-p1">
      <div class="player-hud">
        <span id="p1-count">💥 0</span>
        <span id="p1-timer">⏱ 15s</span>
      </div>
      <div class="balloon-area" id="p1-balloons"></div>
      <div class="timer-bar" id="p1-bar" style="width:100%"></div>
      <span class="player-label">PLAYER 1</span>
    </div>

    <div class="divider">
      <div class="vs-badge">VS</div>
    </div>

    <div class="player-area bottom" id="area-p2">
      <div class="player-hud">
        <span id="p2-count">💥 0</span>
        <span id="p2-timer">⏱ 15s</span>
      </div>
      <div class="balloon-area" id="p2-balloons"></div>
      <div class="timer-bar" id="p2-bar" style="width:100%"></div>
      <span class="player-label">PLAYER 2</span>
    </div>

    <div class="ad-slot">AD · 하단 광고</div>
  </div>

  <!-- COUNTDOWN OVERLAY -->
  <div class="countdown-overlay hidden" id="overlay-countdown">
    <div class="countdown-num" id="cd-num">3</div>
  </div>

  <!-- START OVERLAY -->
  <div class="overlay" id="overlay-start">
    <h1>🎈 풍선 터뜨리기</h1>
    <p><strong>15초</strong> 안에 풍선을 최대한 많이 터뜨리세요!<br>
       더 많이 터뜨린 사람이 승리! 💥</p>
    <button class="btn btn-primary" id="btn-start">START</button>
    <a href="/games/" class="btn btn-ghost" style="margin-top:.75rem;">← 게임 목록</a>
  </div>

  <!-- RESULT OVERLAY -->
  <div class="overlay hidden" id="overlay-result">
    <h1 id="winner-text">🎉 승리!</h1>
    <p id="result-detail"></p>
    <div class="scoreboard">
      <div class="score-cell p1"><div class="label">Player 1</div><div class="value" id="score-p1">0</div></div>
      <div class="score-cell p2"><div class="label">Player 2</div><div class="value" id="score-p2">0</div></div>
    </div>
    <div class="penalty-card hidden" id="penalty-card">
      <div class="emoji" id="penalty-emoji">🎰</div>
      <div class="text" id="penalty-text"></div>
    </div>
    <button class="btn btn-primary" id="btn-penalty">🎰 커플 벌칙 룰렛</button>
    <div style="display:flex; gap:.75rem; margin-top:.75rem;">
      <button class="btn btn-ghost" id="btn-retry">🔄 다시 하기</button>
      <a href="/games/" class="btn btn-ghost">📋 목록</a>
    </div>
  </div>

  <script src="/games/common.js"></script>
  <script>
    (() => {
      'use strict';
      const GAME_ID = 'balloon-pop';
      const GAME_TIME = 15;
      const BALLOON_EMOJIS = ['🎈', '🎈', '🎈', '🟡', '🔴', '🟣', '🟢', '🔵'];
      let scores = GameUtils.getScores(GAME_ID);
      let p1Count = 0, p2Count = 0;
      let gameTimer = null;
      let spawnTimers = [];
      let timeLeft = GAME_TIME;
      let running = false;

      window.onload = () => {
        GameUtils.RemoteManager.showSelectionMenu('풍선 터뜨리기',
          () => { // Local
            // 대기화면 유지
          },
          () => { // Online
            window.location.href = 'online.html';
          }
        );
      };

      function startGame() {
        document.getElementById('overlay-start').classList.add('hidden');
        document.getElementById('overlay-result').classList.add('hidden');
        document.getElementById('penalty-card').classList.add('hidden');

        p1Count = 0; p2Count = 0;
        timeLeft = GAME_TIME;
        
        GameUtils.showFastCountdown(beginPlay);
      }

      function beginPlay() {
        running = true;

        // Spawn balloons for both players
        spawnTimers.push(setInterval(() => spawnBalloon(1), 500));
        spawnTimers.push(setInterval(() => spawnBalloon(2), 500));

        // Timer
        gameTimer = setInterval(() => {
          timeLeft--;
          const pct = (timeLeft / GAME_TIME * 100) + '%';
          document.getElementById('p1-timer').textContent = `⏱ ${timeLeft}s`;
          document.getElementById('p2-timer').textContent = `⏱ ${timeLeft}s`;
          document.getElementById('p1-bar').style.width = pct;
          document.getElementById('p2-bar').style.width = pct;

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      function spawnBalloon(player) {
        if (!running) return;
        const container = document.getElementById(player === 1 ? 'p1-balloons' : 'p2-balloons');
        const rect = container.getBoundingClientRect();
        const balloon = document.createElement('div');
        balloon.className = 'balloon';
        balloon.textContent = BALLOON_EMOJIS[Math.floor(Math.random() * BALLOON_EMOJIS.length)];
        balloon.style.left = (Math.random() * (rect.width - 40) ) + 'px';
        balloon.style.top = (Math.random() * (rect.height - 50)) + 'px';

        balloon.addEventListener('touchstart', e => {
          e.preventDefault();
          e.stopPropagation();
          popBalloon(balloon, player);
        }, { passive: false });
        balloon.addEventListener('click', e => {
          e.stopPropagation();
          popBalloon(balloon, player);
        });

        container.appendChild(balloon);

        // Auto remove after animation
        setTimeout(() => { if (balloon.parentNode) balloon.remove(); }, 1800);
      }

      function popBalloon(balloon, player) {
        if (!running) return;
        GameUtils.vibrate(15);

        // Pop effect
        const pop = document.createElement('div');
        pop.className = 'pop-effect';
        pop.textContent = '💥';
        pop.style.left = balloon.style.left;
        pop.style.top = balloon.style.top;
        balloon.parentNode.appendChild(pop);
        setTimeout(() => pop.remove(), 400);

        balloon.remove();

        if (player === 1) {
          p1Count++;
          document.getElementById('p1-count').textContent = `💥 ${p1Count}`;
        } else {
          p2Count++;
          document.getElementById('p2-count').textContent = `💥 ${p2Count}`;
        }
      }

      function endGame() {
        running = false;
        clearInterval(gameTimer);
        spawnTimers.forEach(t => clearInterval(t));
        spawnTimers = [];

        const winner = p1Count > p2Count ? 1 : p2Count > p1Count ? 2 : 0;
        if (winner === 1) scores.p1++;
        else if (winner === 2) scores.p2++;
        GameUtils.saveScores(GAME_ID, scores);

        document.getElementById('score-p1').textContent = scores.p1;
        document.getElementById('score-p2').textContent = scores.p2;
        document.getElementById('winner-text').textContent =
          winner === 0 ? '🤝 무승부!' : `🎉 Player ${winner} 승리!`;
        document.getElementById('result-detail').textContent =
          `P1: ${p1Count}개 vs P2: ${p2Count}개`;
        document.getElementById('overlay-result').classList.remove('hidden');
        GameUtils.vibrate(100);
      }

      document.getElementById('btn-start').addEventListener('click', startGame);
      document.getElementById('btn-retry').addEventListener('click', startGame);
      document.getElementById('btn-penalty').addEventListener('click', () => {
        const p = GameUtils.spinPenalty();
        document.getElementById('penalty-emoji').textContent = p.slice(0, 2);
        document.getElementById('penalty-text').textContent = p;
        const card = document.getElementById('penalty-card');
        card.classList.remove('hidden');
        card.style.animation = 'none'; void card.offsetWidth; card.style.animation = '';
        GameUtils.vibrate(50);
      });
    })();
  </script>
</body>
</html>
