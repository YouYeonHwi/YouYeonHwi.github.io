<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/games/manifest.json">
  <title>숫자 빨리 누르기 | 커플 게임 광장</title>
  <meta name="description" content="1부터 9까지 순서대로 빨리 누르기! 누가 더 빠를까? 🔢">
  <meta property="og:title" content="🔢 숫자 빨리 누르기 — 손가락 속도 대결!">
  <meta property="og:description" content="커플 숫자 터치 경주! 1~9 순서대로 빨리 누르세요 🏃‍♂️">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --primary-glow: rgba(167,139,250,.35);
      --accent: #f472b6; --bg: #0a0a0f; --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08); --text: #e2e8f0; --text-dim: #64748b; --radius: 20px;
    }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; }
    .game-wrapper { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot { width: 100%; min-height: 50px; background: var(--surface); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: .6rem; letter-spacing: 2px; text-transform: uppercase; flex-shrink: 0; }

    .player-area {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; position: relative; padding: .5rem;
    }
    .player-area.top { transform: rotate(180deg); background: linear-gradient(135deg, #831843, #4a044e); }
    .player-area.bottom { background: linear-gradient(135deg, #1e1b4b, #0c4a6e); }
    .player-label { font-size: .65rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; opacity: .4; position: absolute; bottom: .3rem; }

    .number-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      width: 100%; max-width: 220px;
    }
    .num-btn {
      aspect-ratio: 1; border-radius: 12px; border: 2px solid var(--border);
      background: rgba(255,255,255,.06); font-size: 1.4rem; font-weight: 900;
      color: var(--text); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform .08s, background .15s, border-color .15s;
      font-family: inherit;
    }
    .num-btn:active { transform: scale(.9); }
    .num-btn.done { background: rgba(74,222,128,.15); border-color: #4ade80; color: #4ade80; opacity: .5; pointer-events: none; }
    .num-btn.wrong { background: rgba(239,68,68,.2); border-color: #ef4444; animation: shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

    .status-text { font-size: 1rem; font-weight: 700; margin-bottom: .4rem; min-height: 1.5rem; }

    .divider { width: 100%; height: 36px; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; z-index: 10; background: var(--bg); }
    .divider::before { content: ''; position: absolute; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--primary), transparent); }
    .vs-badge { background: var(--bg); border: 2px solid var(--primary); color: var(--primary); font-weight: 900; font-size: .8rem; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1; }

    .overlay { position: fixed; inset: 0; background: rgba(10,10,15,.94); backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; padding: 2rem; transition: opacity .3s, visibility .3s; }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .overlay h1 { font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: .5rem; }
    .overlay p { color: var(--text-dim); text-align: center; max-width: 320px; line-height: 1.5; margin-bottom: 1.5rem; }
    .btn { display: inline-flex; align-items: center; gap: .5rem; padding: .85rem 2rem; border: none; border-radius: 50px; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; text-decoration: none; color: white; transition: transform .15s; }
    .btn:active { transform: scale(.95); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 4px 20px var(--primary-glow); }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); }
    .scoreboard { display: flex; gap: 2.5rem; margin-bottom: 1.5rem; }
    .score-cell { text-align: center; }
    .score-cell .label { font-size: .75rem; color: var(--text-dim); }
    .score-cell .value { font-size: 2.2rem; font-weight: 900; }
    .score-cell.p1 .value { color: var(--accent); }
    .score-cell.p2 .value { color: var(--primary); }
    .penalty-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem 2rem; text-align: center; max-width: 320px; margin-bottom: 1.5rem; animation: popIn .4s cubic-bezier(.175,.885,.32,1.275); }
    .penalty-card.hidden { display: none; }
    @keyframes popIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .penalty-card .emoji { font-size: 2.5rem; margin-bottom: .5rem; }
    .penalty-card .text { font-size: 1.05rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="ad-slot">AD · 상단 광고</div>
    <div class="player-area top" id="area-p1">
      <div class="status-text" id="status-p1">다음: 1</div>
      <div class="number-grid" id="grid-p1"></div>
      <span class="player-label">PLAYER 1</span>
    </div>
    <div class="divider"><div class="vs-badge">VS</div></div>
    <div class="player-area bottom" id="area-p2">
      <div class="status-text" id="status-p2">다음: 1</div>
      <div class="number-grid" id="grid-p2"></div>
      <span class="player-label">PLAYER 2</span>
    </div>
    <div class="ad-slot">AD · 하단 광고</div>
  </div>

  <div class="overlay" id="overlay-start">
    <h1>🔢 숫자 빨리 누르기</h1>
    <p>1부터 9까지 순서대로 터치!<br>먼저 완료하면 승리 🏆<br>잘못 누르면 시간이 낭비돼요!</p>
    <button class="btn btn-primary" onclick="startGame()">START</button>
    <a href="/games/" class="btn btn-ghost" style="margin-top:.75rem;">← 게임 목록</a>
  </div>

  <div class="overlay hidden" id="overlay-result">
    <h1 id="winner-text">🎉 승리!</h1>
    <p id="time-text"></p>
    <div class="scoreboard">
      <div class="score-cell p1"><div class="label">Player 1</div><div class="value" id="score-p1">0</div></div>
      <div class="score-cell p2"><div class="label">Player 2</div><div class="value" id="score-p2">0</div></div>
    </div>
    <div class="penalty-card hidden" id="penalty-card">
      <div class="emoji" id="penalty-emoji">🎰</div>
      <div class="text" id="penalty-text"></div>
    </div>
    <button class="btn btn-primary" onclick="spinPenalty()">🎰 커플 벌칙 룰렛</button>
    <div style="display:flex; gap:.75rem; margin-top:.75rem;">
      <button class="btn btn-ghost" onclick="startGame()">🔄 다시 하기</button>
      <a href="/games/" class="btn btn-ghost">📋 목록</a>
    </div>
  </div>

  <script src="/games/common.js"></script>
  <script>
    const GAME_ID = 'number-race';
    const MAX_NUM = 9;
    let p1Next = 1, p2Next = 1, playing = false, startTime = 0;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function buildGrid(containerId, player) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      const nums = shuffle([...Array(MAX_NUM)].map((_, i) => i + 1));
      nums.forEach(n => {
        const btn = document.createElement('button');
        btn.className = 'num-btn';
        btn.textContent = n;
        btn.dataset.num = n;
        btn.addEventListener('touchstart', e => { e.preventDefault(); tapNum(player, n, btn); });
        btn.addEventListener('mousedown', e => { e.preventDefault(); tapNum(player, n, btn); });
        container.appendChild(btn);
      });
    }

    function tapNum(player, num, btn) {
      if (!playing) return;
      const expected = player === 1 ? p1Next : p2Next;
      if (num === expected) {
        GameUtils.vibrate(10);
        btn.classList.add('done');
        if (player === 1) {
          p1Next++;
          document.getElementById('status-p1').textContent = p1Next > MAX_NUM ? '완료! 🎉' : `다음: ${p1Next}`;
          if (p1Next > MAX_NUM) win(1);
        } else {
          p2Next++;
          document.getElementById('status-p2').textContent = p2Next > MAX_NUM ? '완료! 🎉' : `다음: ${p2Next}`;
          if (p2Next > MAX_NUM) win(2);
        }
      } else {
        GameUtils.vibrate(80);
        btn.classList.add('wrong');
        setTimeout(() => btn.classList.remove('wrong'), 300);
      }
    }

    function startGame() {
      playing = true; p1Next = 1; p2Next = 1;
      startTime = performance.now();
      document.getElementById('overlay-start').classList.add('hidden');
      document.getElementById('overlay-result').classList.add('hidden');
      document.getElementById('penalty-card').classList.add('hidden');
      document.getElementById('status-p1').textContent = '다음: 1';
      document.getElementById('status-p2').textContent = '다음: 1';
      buildGrid('grid-p1', 1);
      buildGrid('grid-p2', 2);
    }

    function win(player) {
      playing = false;
      const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
      GameUtils.vibrate(50);
      const scores = GameUtils.getScores(GAME_ID);
      if (player === 1) scores.p1++; else scores.p2++;
      GameUtils.saveScores(GAME_ID, scores);
      document.getElementById('score-p1').textContent = scores.p1;
      document.getElementById('score-p2').textContent = scores.p2;
      document.getElementById('winner-text').textContent = `🎉 Player ${player} 승리!`;
      document.getElementById('time-text').textContent = `클리어 시간: ${elapsed}초`;
      document.getElementById('overlay-result').classList.remove('hidden');
    }

    function spinPenalty() {
      const p = GameUtils.spinPenalty();
      document.getElementById('penalty-emoji').textContent = p.slice(0, 2);
      document.getElementById('penalty-text').textContent = p;
      const card = document.getElementById('penalty-card');
      card.classList.remove('hidden'); card.style.animation = 'none'; void card.offsetWidth; card.style.animation = '';
      GameUtils.vibrate(50);
    }
  </script>
</body>
</html>
