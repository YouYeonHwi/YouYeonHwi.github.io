<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>숫자 빨리 누르기 (원격) | 커플 게임 광장</title>
  <!-- 구글 애드센스 자동 광고 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2428685752915797" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --secondary: #f472b6; --bg: #0a0a0f;
      --surface: rgba(255,255,255,.05); --text: #f8fafc;
    }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: manipulation; }
    
    .game-container { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot { height: 50px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #475569; }
    
    .opp-hud { height: 80px; background: rgba(244,114,182,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; border-bottom: 2px solid rgba(255,255,255,0.05); }
    .my-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 250px; margin-top: 1rem; }
    .num-btn {
      aspect-ratio: 1; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      background: var(--surface); color: white; font-size: 1.5rem; font-weight: 900;
      cursor: pointer; transition: all 0.1s;
    }
    .num-btn:active { transform: scale(0.9); }
    .num-btn.done { opacity: 0.1; pointer-events: none; border-color: #4ade80; }
    .num-btn.error { background: rgba(239,68,68,0.2); border-color: #ef4444; animation: shake 0.2s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

    .status-badge { padding: 0.3rem 0.8rem; border-radius: 50px; background: var(--primary); font-size: 0.75rem; font-weight: 800; }
    .next-indicator { font-size: 2.5rem; font-weight: 900; color: var(--primary); margin: 0.5rem 0; }

    .opp-ball { width: 10px; height: 10px; border-radius: 50%; background: #334155; margin: 0 3px; }
    .opp-ball.filled { background: var(--secondary); box-shadow: 0 0 8px var(--secondary); }

    .result-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.96); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; animation: fadeIn 0.4s; }
    .result-overlay.hidden { display: none; }

    /* ═══════════════ HELP MODAL ═══════════════ */
    .overlay { position: fixed; inset: 0; background: rgba(10,10,15,.96); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; transition: opacity .3s, visibility .3s; }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .help-content { text-align: left; max-width: 90%; max-height: 70vh; overflow-y: auto; font-size: .85rem; line-height: 1.6; color: #cbd5e1; }
    .help-content h2 { color: var(--primary); margin-bottom: .8rem; font-size: 1.2rem; }
    .help-content ul { list-style: none; margin-bottom: 1rem; }
    .help-content li { margin-bottom: .4rem; padding-left: 1.2rem; position: relative; }
    .help-content li::before { content: '•'; position: absolute; left: 0; color: var(--secondary); }
    .help-content b { color: #fff; }

    .help-btn { position: absolute; top: 1rem; right: 1rem; z-index: 20; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="ad-slot">
      <!-- 상단 배너 광고 -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2428685752915797"
           data-ad-slot="1234567890"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    
    <div class="opp-hud">
      <div>
        <div style="font-size:0.7rem; color:#64748b; font-weight:700;">상대방 진행</div>
        <div style="display:flex; margin-top:0.4rem;" id="opp-progress"></div>
      </div>
      <div id="opp-lv" style="font-size:1.2rem; font-weight:900; color:var(--secondary);">최근: -</div>
    </div>

    <div class="my-area">
      <button class="help-btn" id="btn-show-help">📜</button>
      <div class="status-badge">다음에 누를 숫자</div>
      <div class="next-indicator" id="next-num">1</div>
      
      <div class="grid" id="game-grid">
        <!-- JS Injection -->
      </div>
    </div>

    <div class="ad-slot">
      <!-- 하단 배너 광고 -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2428685752915797"
           data-ad-slot="0987654321"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <div class="result-overlay hidden" id="result-overlay">
    <h1 id="res-title" style="font-size:3.5rem; margin-bottom:1rem;">패배...</h1>
    <p id="res-detail" style="margin-bottom:2rem; opacity:0.8; font-size:1.2rem;">완료 시간: 12.45초</p>
    <button onclick="location.reload()" style="padding:1rem 2.5rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:900; cursor:pointer; font-size:1.2rem;">다시 하기 / 목록으로</button>
  </div>

  <!-- HELP OVERLAY -->
  <div class="overlay hidden" id="overlay-help">
    <h1 style="color:white; font-size:2rem; margin-bottom:1rem; font-weight:900;">🔢 게임 방법</h1>
    <div class="help-content">
      <h2>핵심 규칙</h2>
      <ul>
        <li>화면에 무작위로 배치된 <b>1부터 9까지</b>의 숫자를 순서대로 터치하세요.</li>
        <li>누구보다 빠르게 9번 버튼까지 모두 누르는 사람이 최종 승리합니다.</li>
      </ul>
      <h2>주의사항</h2>
      <ul>
        <li>순서에 맞지 않는 숫자를 누르면 버튼이 붉게 변하며 <b>0.2초간</b> 터치가 지체됩니다.</li>
      </ul>
    </div>
    <button onclick="document.getElementById('overlay-help').classList.add('hidden')" style="margin-top:1.5rem; padding:1rem 2rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">확인</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common.js"></script>
  <script src="online.js"></script>
</body>
</html>
