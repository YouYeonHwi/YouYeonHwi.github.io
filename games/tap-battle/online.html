<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="google-adsense-account" content="ca-pub-2428685752915797">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2428685752915797" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>순발력 터치 (원격) | 커플 게임 광장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --secondary: #f472b6; --bg: #0a0a0f;
      --surface: rgba(255,255,255,.05); --text: #f8fafc;
    }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: none; }
    
    .game-container { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot { height: 50px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #475569; }
    
    .tap-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: background 0.2s; cursor: pointer; }
    .tap-area.opponent { border-bottom: 2px solid rgba(255,255,255,0.1); background: rgba(244,114,182,0.03); }
    .tap-area.mine { background: rgba(167,139,250,0.03); }
    
    .tap-area.go { background: #4ade80 !important; }
    .tap-area.fail { background: #ef4444 !important; }

    .status-msg { font-size: 1.5rem; font-weight: 900; text-align: center; pointer-events: none; }
    .tap-count { 
      font-size: min(5rem, 15vw); 
      font-weight: 900; 
      opacity: 0.2; 
      position: absolute; 
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      color: white;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }

    .center-info { 
      position: absolute; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%); 
      z-index: 10; 
      background: var(--bg); 
      padding: 0.6rem 1.5rem; 
      border-radius: 50px; 
      border: 1px solid var(--primary); 
      font-weight: 800; 
      font-size: 0.9rem; 
      pointer-events: none; 
      box-shadow: 0 0 20px rgba(167,139,250,0.2);
      white-space: nowrap;
    }

    .result-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.95); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .result-overlay.hidden { display: none; }

    /* ═══════════════ HELP MODAL ═══════════════ */
    .overlay { position: fixed; inset: 0; background: rgba(10,10,15,.96); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; transition: opacity .3s, visibility .3s; }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .help-content { text-align: left; max-width: 90%; max-height: 70vh; overflow-y: auto; font-size: .85rem; line-height: 1.6; color: #cbd5e1; }
    .help-content h2 { color: var(--primary); margin-bottom: .8rem; font-size: 1.2rem; }
    .help-content ul { list-style: none; margin-bottom: 1rem; }
    .help-content li { margin-bottom: .4rem; padding-left: 1.2rem; position: relative; }
    .help-content li::before { content: '•'; position: absolute; left: 0; color: var(--secondary); }
    .help-content b { color: #fff; }

    .btn { display: inline-flex; align-items: center; justify-content: center; padding: .85rem 2rem; border: none; border-radius: 50px; font-family: inherit; font-weight: 700; font-size: 1rem; cursor: pointer; transition: transform .15s; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 20px rgba(167,139,250,0.3); }
    .btn:active { transform: scale(.95); }
    
    .help-btn { position: absolute; top: 1rem; right: 1rem; z-index: 20; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <div class="game-container">

    <!-- Opponent -->
    <div class="tap-area opponent" id="opp-area">
      <button class="help-btn" id="btn-show-help">📜</button>
      <div class="tap-count" id="opp-count">0</div>
      <div class="status-msg" id="opp-msg">연결 대기 중...</div>
    </div>

    <!-- Divider -->
    <div class="center-info" id="game-status">원격 대결</div>

    <!-- Me -->
    <div class="tap-area mine" id="my-area">
      <div class="status-msg" id="my-msg">로딩 중...</div>
      <div class="tap-count" id="my-count">0</div>
    </div>

  </div>

  <div class="result-overlay hidden" id="result-overlay">
    <h1 id="result-winner" style="font-size:3.5rem; margin-bottom:1rem; background:linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">승리!</h1>
    <p id="result-detail" style="font-size:1.2rem; opacity:0.8; margin-bottom:2rem;">반응 속도: 0.42s</p>
    <button onclick="location.reload()" style="padding:1rem 2.5rem; border-radius:50px; background:linear-gradient(135deg, var(--primary), var(--secondary)); color:white; border:none; font-weight:900; font-size:1.2rem; cursor:pointer; box-shadow:0 10px 30px rgba(167,139,250,0.3);">다시 하기</button>
  </div>

  <!-- HELP OVERLAY -->
  <div class="overlay hidden" id="overlay-help">
    <h1 style="color:white; font-size:2rem; margin-bottom:1rem; font-weight:900;">⚡ 게임 방법</h1>
    <div class="help-content">
      <h2>핵심 규칙</h2>
      <ul>
        <li>화면이 <b>초록색(GO!)</b>으로 변하는 순간, 자기 쪽 화면을 누구보다 빠르게 터치하세요!</li>
        <li>초록색으로 변하기 전에 먼저 터치하면 <b>반칙패(Early Tap)</b>로 인정됩니다.</li>
      </ul>
      <h2>팁</h2>
      <ul>
        <li>소리보다 시각적인 변화에 집중하면 더 빠른 반응이 가능합니다.</li>
        <li>상대방의 움직임에 낚이지 않도록 주의하세요!</li>
      </ul>
    </div>
    <button class="btn" id="btn-close-help" style="margin-top:1.5rem;">확인</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common.js"></script>
  <script src="online.js"></script>
</body>
</html>
