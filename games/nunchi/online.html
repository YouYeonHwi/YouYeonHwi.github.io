<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>눈치 게임 (원격) | 커플 게임 광장</title>
  <!-- 구글 애드센스 자동 광고 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2428685752915797" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --secondary: #f472b6; --bg: #0a0a0f;
      --surface: rgba(255,255,255,.05); --text: #f8fafc;
    }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: manipulation; }
    
    .game-container { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot { height: 50px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #475569; }
    
    .center-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    
    .number-box {
      font-size: 8rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    .tap-btn {
      width: 150px; height: 150px; border-radius: 50%;
      border: 4px solid var(--primary); background: rgba(167,139,250,0.1);
      color: var(--primary); font-size: 1.5rem; font-weight: 800;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(167,139,250,0.2);
    }
    .tap-btn:active { transform: scale(0.9); background: var(--primary); color: white; }
    .tap-btn.disabled { opacity: 0.2; pointer-events: none; }

    .status-msg { margin-top: 2rem; font-size: 1.1rem; font-weight: 700; color: #94a3b8; }
    
    .opp-status { position: absolute; top: 1rem; width: 100%; text-align: center; font-size: 0.8rem; color: var(--secondary); font-weight: 700; }

    .result-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.96); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; animation: fadeIn 0.4s; }
    .result-overlay.hidden { display: none; }

    /* ═══════════════ HELP MODAL ═══════════════ */
    .overlay { position: fixed; inset: 0; background: rgba(10,10,15,.96); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; transition: opacity .3s, visibility .3s; }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .help-content { text-align: left; max-width: 90%; max-height: 70vh; overflow-y: auto; font-size: .85rem; line-height: 1.6; color: #cbd5e1; }
    .help-content h2 { color: var(--primary); margin-bottom: .8rem; font-size: 1.2rem; }
    .help-content ul { list-style: none; margin-bottom: 1rem; }
    .help-content li { margin-bottom: .4rem; padding-left: 1.2rem; position: relative; }
    .help-content li::before { content: '•'; position: absolute; left: 0; color: var(--secondary); }
    .help-content b { color: #fff; }

    .help-btn { position: absolute; top: 1rem; right: 1rem; z-index: 20; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="ad-slot">
      <!-- 상단 배너 광고 -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2428685752915797"
           data-ad-slot="1234567890"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
    
    <div class="center-panel">
      <button class="help-btn" id="btn-show-help">📜</button>
      <div class="opp-status" id="opp-status">상대방 대기 중...</div>
      
      <div class="number-box" id="current-num">0</div>
      
      <button class="tap-btn" id="tap-btn">눌러!</button>
      
      <div class="status-msg" id="game-msg">먼저 10을 외치세요!</div>
    </div>

    <div class="ad-slot">
      <!-- 하단 배너 광고 -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-2428685752915797"
           data-ad-slot="0987654321"
           data-ad-format="horizontal"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <div class="result-overlay hidden" id="result-overlay">
    <h1 id="res-title" style="font-size:3.5rem; margin-bottom:1rem;">🎉 승리!</h1>
    <p id="res-detail" style="margin-bottom:2rem; opacity:0.8; font-size:1.2rem;">상대방과 동시에 눌러서 둘 다 패배!</p>
    <button onclick="location.reload()" style="padding:1rem 2.5rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:900; cursor:pointer; font-size:1.2rem;">다시 하기 / 홈으로</button>
  </div>

  <!-- HELP OVERLAY -->
  <div class="overlay hidden" id="overlay-help">
    <h1 style="color:white; font-size:2rem; margin-bottom:1rem; font-weight:900;">👀 게임 방법</h1>
    <div class="help-content">
      <h2>핵심 규칙</h2>
      <ul>
        <li>숫자를 <b>1부터 순서대로</b> 외치는 고전 게임입니다.</li>
        <li>아래 "눌러!" 버튼을 터치하여 다음 숫자를 외칠 수 있습니다.</li>
        <li>상대방과 <b>동시에</b> 숫자를 외치면(터치하면) 즉시 <b>무승부로 종료</b>됩니다.</li>
      </ul>
      <h2>승리 요건</h2>
      <ul>
        <li>목표 숫자인 <b>10</b>을 누구보다 먼저 외치는 사람이 최종 승리합니다!</li>
      </ul>
      <h2>팁</h2>
      <ul>
        <li>상대방이 언제 누를지 눈치싸움하는 것이 핵심입니다.</li>
      </ul>
    </div>
    <button onclick="document.getElementById('overlay-help').classList.add('hidden')" style="margin-top:1.5rem; padding:1rem 2rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">확인</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common.js"></script>
  <script src="online.js"></script>
</body>
</html>
