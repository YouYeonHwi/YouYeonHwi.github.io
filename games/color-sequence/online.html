<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="google-adsense-account" content="ca-pub-2428685752915797">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2428685752915797" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>색깔 순서 (원격) | 커플 게임 광장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --secondary: #f472b6; --bg: #0a0a0f;
      --surface: rgba(255,255,255,.05); --text: #f8fafc;
    }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: manipulation; }
    
    .game-container { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot { height: 50px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #475569; }
    
    .status-panel { padding: 1rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .turn-badge { display: inline-block; padding: 0.3rem 1rem; border-radius: 50px; background: var(--primary); font-weight: 800; font-size: 0.8rem; margin-bottom: 0.5rem; }

    .areas { flex: 1; display: flex; flex-direction: column; }
    .player-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
    .opp-area { background: rgba(244,114,182,0.03); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .my-area { background: rgba(167,139,250,0.03); }

    .color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 200px; }
    .color-btn {
      aspect-ratio: 1; border-radius: 12px; border: 2px solid rgba(255,255,255,0.05);
      cursor: pointer; opacity: 0.3; transition: all 0.15s;
    }
    .color-btn.active { opacity: 1; transform: scale(1.05); box-shadow: 0 0 20px currentColor; }
    .color-btn.disabled { pointer-events: none; }

    .btn-red { background: #ef4444; color: #ef4444; }
    .btn-blue { background: #3b82f6; color: #3b82f6; }
    .btn-green { background: #22c55e; color: #22c55e; }
    .btn-yellow { background: #eab308; color: #eab308; }

    .info-label { font-size: 0.7rem; color: #64748b; font-weight: 700; margin-bottom: 0.5rem; }

    .result-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.96); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; animation: fadeIn 0.4s; }
    .result-overlay.hidden { display: none; }

    /* ═══════════════ HELP MODAL ═══════════════ */
    .overlay { position: fixed; inset: 0; background: rgba(10,10,15,.96); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; transition: opacity .3s, visibility .3s; }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .help-content { text-align: left; max-width: 90%; max-height: 70vh; overflow-y: auto; font-size: .85rem; line-height: 1.6; color: #cbd5e1; }
    .help-content h2 { color: var(--primary); margin-bottom: .8rem; font-size: 1.2rem; }
    .help-content ul { list-style: none; margin-bottom: 1rem; }
    .help-content li { margin-bottom: .4rem; padding-left: 1.2rem; position: relative; }
    .help-content li::before { content: '•'; position: absolute; left: 0; color: var(--secondary); }
    .help-content b { color: #fff; }

    .help-btn { position: absolute; top: 1rem; right: 1rem; z-index: 20; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <div class="game-container">
    
    <div class="status-panel">
      <button class="help-btn" id="btn-show-help">📜</button>
      <div class="turn-badge" id="turn-txt">연결 대기 중</div>
      <div style="font-size:0.9rem; font-weight:800; color:#4ade80;" id="game-msg">상대방을 기다립니다</div>
    </div>

    <div class="areas">
      <!-- Opponent View -->
      <div class="player-area opp-area">
        <div class="info-label">상대방 (레벨: <span id="opp-lv">0</span>)</div>
        <div class="color-grid" id="opp-grid">
          <div class="color-btn btn-red disabled" data-color="red"></div>
          <div class="color-btn btn-blue disabled" data-color="blue"></div>
          <div class="color-btn btn-green disabled" data-color="green"></div>
          <div class="color-btn btn-yellow disabled" data-color="yellow"></div>
        </div>
      </div>

      <!-- My View -->
      <div class="player-area my-area">
        <div class="info-label">나 (레벨: <span id="my-lv">0</span>)</div>
        <div class="color-grid" id="my-grid">
          <div class="color-btn btn-red" data-color="red"></div>
          <div class="color-btn btn-blue" data-color="blue"></div>
          <div class="color-btn btn-green" data-color="green"></div>
          <div class="color-btn btn-yellow" data-color="yellow"></div>
        </div>
      </div>
    </div>

  </div>

  <div class="result-overlay hidden" id="result-overlay">
    <h1 id="res-title" style="font-size:3rem; margin-bottom:1rem;">패배...</h1>
    <p id="res-detail" style="margin-bottom:2rem; opacity:0.8; font-size:1.1rem;">레벨: 나 4 | 상대 6</p>
    <button onclick="location.reload()" style="padding:1rem 2.5rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">홈으로 / 다시 하기</button>
  </div>

  <!-- HELP OVERLAY -->
  <div class="overlay hidden" id="overlay-help">
    <h1 style="color:white; font-size:2rem; margin-bottom:1rem; font-weight:900;">🎨 게임 방법</h1>
    <div class="help-content">
      <h2>핵심 규칙</h2>
      <ul>
        <li>화면의 색깔 블록들이 무작위 순서로 반짝입니다.</li>
        <li>반짝임이 끝나면, 방금 본 <b>순서 그대로</b> 블록을 터치하세요!</li>
      </ul>
      <h2>게임 방식</h2>
      <ul>
        <li>각 플레이어는 번갈아가며 한 번씩 도전할 기회를 갖습니다.</li>
        <li>틀리기 전까지 최대한 많은 단계를 통과하여, 더 높은 레벨을 기록한 사람이 승리합니다.</li>
      </ul>
    </div>
    <button onclick="document.getElementById('overlay-help').classList.add('hidden')" style="margin-top:1.5rem; padding:1rem 2rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">확인</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common.js"></script>
  <script src="online.js"></script>
</body>
</html>
