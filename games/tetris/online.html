<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="google-adsense-account" content="ca-pub-2428685752915797">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2428685752915797" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>테트리스 배틀 온라인 | 커플 게임 광장</title>
  <meta name="keywords" content="tetris battle, online battle">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://youyeonhwi.github.io/games/tetris/online.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="테트리스 배틀 온라인 | 커플 게임 광장">
  <meta property="og:description" content="Real-time 1:1 tetris battle online">
  <meta property="og:url" content="https://youyeonhwi.github.io/games/tetris/online.html">
  <meta property="og:site_name" content="Whistle's Dev Diary">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="테트리스 배틀 온라인 | 커플 게임 광장">
  <meta name="twitter:description" content="Real-time 1:1 tetris battle online">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary:      #a78bfa;
      --primary-glow: rgba(167,139,250,.35);
      --accent:       #f472b6;
      --accent-glow:  rgba(244,114,182,.3);
      --green:        #4ade80;
      --red:          #ef4444;
      --bg:           #0a0a0f;
      --surface:      rgba(255,255,255,.04);
      --surface2:     rgba(255,255,255,.07);
      --border:       rgba(255,255,255,.08);
      --text:         #e2e8f0;
      --text-dim:     #64748b;
      --p1:           #f472b6; /* Player 1 (Host) */
      --p2:           #a78bfa; /* Player 2 (Guest) */
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; touch-action: none;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .hidden { display: none !important; }

    /* ════════════ OVERLAY ════════════ */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,10,15,.96); backdrop-filter: blur(20px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem 1.5rem; text-align: center;
    }

    /* ════════════ TOP BAR (Yahtzee Benchmarked) ════════════ */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: .6rem 1rem; flex-shrink: 0;
    }
    .back-link {
      color: var(--text-dim); text-decoration: none; font-size: .75rem; font-weight: 600;
      padding: .25rem .5rem; border-radius: 8px; border: 1px solid var(--border);
    }
    .mini-scores { display: flex; gap: 0.8rem; font-size: .85rem; font-weight: 700; }
    .ms-p1 { color: var(--p1); }
    .ms-p2 { color: var(--p2); }
    .ms-active { transform: scale(1.15); text-shadow: 0 0 10px currentColor; }

    .turn-indicator {
      font-size: .75rem; font-weight: 700; padding: .35rem .9rem; border-radius: 50px;
      transition: all 0.3s; border: 1px solid var(--border);
      background: rgba(255,255,255,0.05); color: var(--text-dim);
    }
    .turn-indicator.active.p1 {
      border-color: var(--p1); color: var(--p1); background: rgba(244,114,182,0.1);
      box-shadow: 0 0 15px rgba(244,114,182,0.2);
    }
    .turn-indicator.active.p2 {
      border-color: var(--p2); color: var(--p2); background: rgba(167,139,250,0.1);
      box-shadow: 0 0 15px rgba(167,139,250,0.2);
    }

    /* ════════════ GAME SCREEN ════════════ */
    #game-screen {
      height: 100dvh; display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .battle-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: .5rem; gap: .75rem; overflow: hidden;
    }

    .my-board-wrap {
      position: relative; flex-shrink: 0;
      background: rgba(0,0,0,.5); border: 2px solid var(--border);
      border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,.8);
      overflow: hidden;
    }
    #my-canvas { display: block; image-rendering: pixelated; }

    .board-notif {
      position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
      font-weight: 900; font-size: 1rem; color: var(--red); pointer-events: none; opacity: 0;
      white-space: nowrap; z-index: 10;
    }

    .right-sidebar {
      display: flex; flex-direction: column; gap: .4rem; flex-shrink: 0; width: 72px;
    }
    .sidebar-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: .4rem; text-align: center;
    }
    .sidebar-card .s-label { font-size: .45rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: .25rem; }
    
    #opp-canvas { display: block; width: 100%; image-rendering: pixelated; border-radius: 4px; opacity: .85; }

    .touch-controls {
      display: flex; gap: .4rem; padding: .4rem .75rem; flex-shrink: 0;
    }
    .ctrl-btn {
      flex: 1; padding: .5rem 0; border-radius: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: .9rem; font-weight: 700;
      cursor: pointer; text-align: center;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .ctrl-btn:active { background: rgba(167,139,250,.2); }
    .ctrl-btn.hard-drop { background: rgba(244,114,182,.08); color: var(--accent); border-color: rgba(244,114,182,.2); }
    .ctrl-btn.hold-btn  { font-size: .65rem; font-weight: 800; color: var(--primary); }

    #swipe-zone { position: absolute; inset: 0; z-index: 20; touch-action: none; }

    @keyframes attack-border {
      0%,100% { box-shadow: 0 0 0 1px rgba(167,139,250,.15), 0 0 40px rgba(0,0,0,.8); }
      25%,75% { box-shadow: 0 0 0 3px var(--red), 0 0 30px rgba(239,68,68,.4); }
    }
    .under-attack { animation: attack-border .5s ease; }
    
    @keyframes board-shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
    }
    .board-shake { animation: board-shake .35s ease; }

    @keyframes notif-rise {
      0%{opacity:0;transform:translateX(-50%) translateY(0) scale(.6)}
      15%{opacity:1;transform:translateX(-50%) translateY(-10px) scale(1.1)}
      70%{opacity:1;transform:translateX(-50%) translateY(-30px) scale(1)}
      100%{opacity:0;transform:translateX(-50%) translateY(-60px) scale(.9)}
    }

    .result-badge { font-size: 3rem; margin-bottom: .5rem; }
    .result-title { font-size: 2.2rem; font-weight: 900; margin-bottom: .25rem; color: #fff; }
    .result-sub { color: var(--text-dim); font-size: .9rem; margin-bottom: 1.5rem; }
    .result-stats {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1rem 1.5rem; width: 100%; max-width: 260px; margin-bottom: 1.5rem;
    }
    .stat-row { display: flex; justify-content: space-between; padding: .3rem 0; border-bottom: 1px solid rgba(255,255,255,.04); font-size: .82rem; }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--text-dim); }
    .stat-val { font-weight: 800; }
    
    .menu-group { display: flex; flex-direction: column; gap: .75rem; width: 100%; max-width: 280px; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      padding: .9rem 1.5rem; border-radius: 50px; border: none; font-family: inherit; font-weight: 700; font-size: .95rem; cursor: pointer; text-decoration: none;
    }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: #fff; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  </style>
</head>
<body>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="hidden">
  <div class="top-bar">
    <a href="/games/" class="btn btn-ghost" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">← 목록</a>
    <div class="mini-scores">
      <span id="ms-p1" class="ms-p1">P1 0</span>
      <span style="color:var(--border)">:</span>
      <span id="ms-p2" class="ms-p2">P2 0</span>
    </div>
    <div id="turn-indicator" class="turn-indicator active p1">배틀 중</div>
  </div>

  <div class="battle-area">
    <div class="my-board-wrap" id="my-board-wrap">
      <canvas id="my-canvas"></canvas>
      <div class="board-notif" id="board-notif"></div>
      <div id="swipe-zone"></div>
    </div>

    <div class="right-sidebar">
      <div class="sidebar-card">
        <div class="s-label">NEXT</div>
        <canvas id="next-canvas" width="64" height="64" style="width:100%;image-rendering:pixelated;"></canvas>
      </div>
      <div class="sidebar-card">
        <div class="s-label">LIVE</div>
        <canvas id="opp-canvas" width="64" height="128"></canvas>
      </div>
      <div class="sidebar-card">
        <div class="s-label">LV</div>
        <div style="font-size:.85rem; font-weight:900; color:var(--primary);" id="level-badge">1</div>
        <div class="s-label" style="margin-top:.2rem;">LINES</div>
        <div style="font-size:.75rem; font-weight:700; color:var(--text-dim);" id="lines-badge">0</div>
      </div>
    </div>
  </div>

  <div class="touch-controls">
    <button class="ctrl-btn hold-btn" id="ctrl-hold">HOLD</button>
    <button class="ctrl-btn" id="ctrl-left">◀</button>
    <button class="ctrl-btn" id="ctrl-rotate">↺</button>
    <button class="ctrl-btn" id="ctrl-right">▶</button>
    <button class="ctrl-btn hard-drop" id="ctrl-hard">▼▼</button>
  </div>
</div>

<!-- ═══ RESULT OVERLAY ═══ -->
<div id="overlay-result" class="overlay hidden">
    <div class="lobby-ad-slot" style="margin:1rem 0; width:100%; max-width:320px;">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2428685752915797" data-ad-slot="8298966499" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  <div class="result-badge" id="res-emoji">🏆</div>
  <div class="result-title" id="res-title">VICTORY!</div>
  <div class="result-sub" id="res-sub">상대방보다 더 오래 버텼습니다!</div>
  <div class="result-stats">
    <div class="stat-row"><span class="stat-label">최종 점수</span><span class="stat-val" id="res-score">0</span></div>
    <div class="stat-row"><span class="stat-label">지운 줄</span><span class="stat-val" id="res-lines">0</span></div>
    <div class="stat-row"><span class="stat-label">도달 레벨</span><span class="stat-val" id="res-level">1</span></div>
  </div>
  <div class="menu-group">
    <a href="online.html" class="btn btn-primary">🔄 다시 대결</a>
    <a href="index.html" class="btn btn-ghost">← 메인으로</a>
  </div>
</div>

<!-- Firebase 및 공공 엔진 -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="../firebase-config.js"></script>
<script src="../common.js"></script>
<script src="tetris-core.js"></script>

<script>
(() => {
  'use strict';
  const $ = id => document.getElementById(id);
  const GAME_ID = 'tetris';

  const overlayResult = $('overlay-result');
  const gameScreen    = $('game-screen');
  const boardWrap     = $('my-board-wrap');
  const boardNotif    = $('board-notif');
  const nextCtx       = $('next-canvas').getContext('2d');
  const oppCanvas     = $('opp-canvas');
  const oppCtx        = oppCanvas.getContext('2d');

  let game       = null;
  let myRole     = null;
  let prevAtkVal = 0;
  let gameActive = false;

  const initState = {
    p1Grid: null, p2Grid: null,
    p1Score: 0, p2Score: 0,
    p1Level: 1, p2Level: 1,
    attackForP1: 0, attackForP2: 0,
    p1GameOver: false, p2GameOver: false,
  };

  // 1. 방 만들기 및 로직 통합 실행
  GameUtils.RemoteManager.openLobby(GAME_ID, initState, () => {
    myRole = GameUtils.RemoteManager.getRole();
    GameUtils.RemoteManager.init(GAME_ID, onRemoteSync);
    launchGame(myRole);
  });

  function launchGame(role) {
    gameScreen.classList.remove('hidden');
    myRole = role;
    
    // UI 초기화
    const turnIndicator = $('turn-indicator');
    turnIndicator.className = 'turn-indicator active p1';
    turnIndicator.textContent = '배틀 중 ⚔️';

    const avH   = window.innerHeight * 0.68;
    const avW   = Math.min(window.innerWidth * 0.52, 240);
    const scale = Math.floor(Math.min(avW / COLS, avH / ROWS));
    $('my-canvas').width  = COLS * scale;
    $('my-canvas').height = ROWS * scale;
    oppCanvas.width  = 64;
    oppCanvas.height = Math.round(64 * ROWS / COLS);

    gameActive = true;
    game = new TetrisGame('my-canvas', {
      onAttack:    sendAttack,
      onGameOver:  onLocalGameOver,
      onUpdate:    syncState,
      onLineClear: handleLineClear,
    });
    game.scale = scale;
    game.start();
    syncState(game);
    bindControls();
  }

  function syncState(g) {
    if (!gameActive) return;
    g = g || game;
    const pos = myRole === 'p1';
    
    GameUtils.RemoteManager.updateField(pos ? 'p1Grid' : 'p2Grid', g.gridSnapshot());
    GameUtils.RemoteManager.updateField(pos ? 'p1Score' : 'p2Score', g.score);
    GameUtils.RemoteManager.updateField(pos ? 'p1Level' : 'p2Level', g.level);

    // 로컬 상단 점수판 즉시 업데이트
    $(`ms-${myRole}`).textContent = `P${myRole === 'p1' ? '1' : '2'} ${g.score.toLocaleString()}`;
    $(`ms-${myRole}`).classList.add('ms-active');
    
    $('level-badge').textContent = g.level;
    $('lines-badge').textContent = g.lines;
    renderNext(g.queue[0]);
  }

  function sendAttack(count) {
    const key = myRole === 'p1' ? 'attackForP2' : 'attackForP1';
    const state = GameUtils.RemoteManager.getRoomState();
    const prev = (state && state[key]) || 0;
    GameUtils.RemoteManager.updateField(key, prev + count);
  }

  function onRemoteSync(state) {
    if (!state || !gameActive || !game) return;

    // 상단 득점 현황 동기화
    $('ms-p1').textContent = `P1 ${(state.p1Score || 0).toLocaleString()}`;
    $('ms-p2').textContent = `P2 ${(state.p2Score || 0).toLocaleString()}`;

    // 상대방 보드 프리뷰
    const oppGrid = myRole === 'p1' ? state.p2Grid : state.p1Grid;
    if (oppGrid) TetrisGame.renderGridSnapshot(oppCtx, oppGrid, oppCanvas.width, oppCanvas.height);

    // 상대방의 공격 전송 확인
    const myAtkKey = myRole === 'p1' ? 'attackForP1' : 'attackForP2';
    const newAtkVal = state[myAtkKey] || 0;
    if (newAtkVal > prevAtkVal) {
      const lines = newAtkVal - prevAtkVal;
      prevAtkVal = newAtkVal;
      if (game && !game.gameOver) {
        game.addGarbage(lines);
        showNotif(`ATTACKED! +${lines}줄`, '#ef4444');
        boardWrap.classList.remove('under-attack', 'board-shake');
        void boardWrap.offsetWidth;
        boardWrap.classList.add('under-attack', 'board-shake');
        setTimeout(() => boardWrap.classList.remove('board-shake', 'under-attack'), 450);
      }
    }

    // 상대방 게임오버 체크
    const oppOver = myRole === 'p1' ? state.p2GameOver : state.p1GameOver;
    if (oppOver && gameActive) {
      gameActive = false;
      game?.stop();
      showResult('victory');
    }
  }

  function onLocalGameOver() {
    if (!gameActive) return;
    gameActive = false;
    GameUtils.RemoteManager.updateField(myRole === 'p1' ? 'p1GameOver' : 'p2GameOver', true);
    showResult('defeat');
  }

  function handleLineClear(n, combo) {
    const texts = ['', 'SINGLE', 'DOUBLE!', 'TRIPLE!!', '★ TETRIS ★'];
    const colors = ['', '#4ade80', '#facc15', '#f97316', '#f472b6'];
    showNotif(texts[n] || '', colors[n] || '#fff');
    if (combo > 1) setTimeout(() => showNotif(`${combo} COMBO!`, '#a78bfa'), 420);
    if (n >= 4) {
      boardWrap.classList.add('board-shake');
      setTimeout(() => boardWrap.classList.remove('board-shake'), 400);
    }
  }

  function showNotif(text, color = '#ef4444') {
    boardNotif.textContent = text;
    boardNotif.style.color = color;
    boardNotif.style.textShadow = `0 0 20px ${color}88`;
    boardNotif.style.animation = 'none';
    void boardNotif.offsetWidth;
    boardNotif.style.animation = 'notif-rise 1.2s ease forwards';
  }

  function renderNext(type) {
    nextCtx.clearRect(0,0,64,64);
    if (type) TetrisGame.drawMiniPiece(nextCtx, type, 32, 32, 11);
  }

  function showResult(outcome) {
    setTimeout(() => {
      gameScreen.classList.add('hidden');
      overlayResult.classList.remove('hidden');
      $('res-emoji').textContent = outcome === 'victory' ? '🏆' : '💀';
      $('res-title').textContent = outcome === 'victory' ? 'VICTORY!' : 'DEFEAT';
      $('res-sub').textContent   = outcome === 'victory' ? '상대방이 먼저 탈락했습니다!' : '상대방이 승리했습니다.';
      $('res-score').textContent = (game?.score || 0).toLocaleString();
      $('res-lines').textContent = game?.lines || 0;
      $('res-level').textContent = game?.level || 1;
    }, 700);
  }

  function bindControls() {
    document.addEventListener('keydown', e => {
      if (!game || game.gameOver || game.stopped) return;
      switch (e.key) {
        case 'ArrowLeft':  e.preventDefault(); game.moveX(-1);  break;
        case 'ArrowRight': e.preventDefault(); game.moveX(1);   break;
        case 'ArrowDown':  e.preventDefault(); game.drop();     break;
        case 'ArrowUp':    e.preventDefault(); game.rotate(1);  break;
        case ' ':          e.preventDefault(); game.hardDrop(); break;
        case 'c': case 'C':                    game.holdPiece(); break;
      }
    });

    const makeRepeat = (fn, d=500, r=80) => {
      let t;
      return {
        down() { fn(); t = setTimeout(() => { t = setInterval(fn, r); }, d); },
        up()   { clearTimeout(t); clearInterval(t); }
      };
    };
    const rL = makeRepeat(() => game?.moveX(-1));
    const rR = makeRepeat(() => game?.moveX(1));
    $('ctrl-left').addEventListener('pointerdown', rL.down);
    $('ctrl-left').addEventListener('pointerup', rL.up);
    $('ctrl-right').addEventListener('pointerdown', rR.down);
    $('ctrl-right').addEventListener('pointerup', rR.up);
    $('ctrl-rotate').addEventListener('click', () => game?.rotate(1));
    $('ctrl-hard').addEventListener('click', () => game?.hardDrop());
    $('ctrl-hold').addEventListener('click', () => game?.holdPiece());

    const swipeZone = $('swipe-zone');
    let sx, sy, lx, moved;
    swipeZone.addEventListener('pointerdown', e => { sx = lx = e.clientX; sy = e.clientY; moved = false; });
    swipeZone.addEventListener('pointermove', e => {
      if (!game || game.gameOver || game.stopped) return;
      const dx = e.clientX - lx, dy = e.clientY - sy;
      if (Math.abs(dx) >= 20) { game.moveX(dx > 0 ? 1 : -1); lx = e.clientX; moved = true; }
      if (dy >= 30) { game.drop(); sy = e.clientY; moved = true; }
    });
    swipeZone.addEventListener('pointerup', e => {
      if (!moved) {
        const dx = Math.abs(e.clientX - sx), dy = Math.abs(e.clientY - sy);
        if (dx < 12 && dy < 12) {
          const rect = swipeZone.getBoundingClientRect();
          if (e.clientY - rect.top < rect.height * 0.55) game?.rotate(1);
          else game?.hardDrop();
        }
      }
    });
    swipeZone.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  }

})();
</script>
</body>
</html>
