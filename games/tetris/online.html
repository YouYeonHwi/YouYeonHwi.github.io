<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/games/manifest.json">

  <title>테트리스 온라인 | 커플 게임 광장</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #a78bfa; --primary-glow: rgba(167,139,250,.35);
      --accent: #f472b6; --accent-glow: rgba(244,114,182,.3);
      --bg: #0a0a0f; --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08); --text: #e2e8f0; --text-dim: #64748b;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg);
      color: var(--text); overflow: hidden; touch-action: none;
    }

    .remote-container {
      display: flex; flex-direction: column; height: 100dvh;
      padding: env(safe-area-inset-top, 1rem) 1rem env(safe-area-inset-bottom, 1rem);
    }

    /* ─── 상단 바 (내 정보 & 상대 정보) ─── */
    .game-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 0.5rem;
    }
    
    .player-info { display: flex; flex-direction: column; gap: 0.25rem; }
    .player-info .name { font-weight: 800; font-size: 0.9rem; }
    .player-info .score { font-size: 1.2rem; font-weight: 900; color: var(--primary); }

    /* ─── 메인 대결 구도 ─── */
    .battle-layout {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; gap: 1rem;
    }

    .my-board-wrap {
      position: relative; background: rgba(0,0,0,0.4);
      border: 3px solid var(--border); border-radius: 12px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    #my-canvas { display: block; image-rendering: pixelated; }

    /* 상대방 미니 프리뷰 */
    .opp-preview {
      position: absolute; top: 0; right: 0;
      width: 100px; padding: 4px; background: rgba(255,255,255,0.02);
      border: 2px solid var(--border); border-radius: 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .opp-preview .label { font-size: 0.6rem; font-weight: 800; color: var(--text-dim); text-align: center; }
    #opp-canvas { width: 100%; height: auto; border: 1px solid rgba(255,255,255,0.1); opacity: 0.7; }

    /* ─── 알림 UI ─── */
    .status-msg {
      position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
      pointer-events: none; text-align: center; z-index: 100;
    }
    .attack-alert {
      font-size: 1.8rem; font-weight: 900; color: #ef4444; opacity: 0;
      text-shadow: 0 0 20px rgba(239,68,68,0.6);
    }

    /* ─── 오버레이 (대기실 등) ─── */
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,0.98);
      backdrop-filter: blur(20px); z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .hidden { display: none !important; }

    .btn {
      padding: 1rem 2rem; border-radius: 50px; border: none; font-weight: 800;
      cursor: pointer; background: var(--primary); color: white;
    }
    
    @keyframes pulse-red {
      0% { box-shadow: inset 0 0 0px #ef4444; }
      50% { box-shadow: inset 0 0 50px #ef4444; }
      100% { box-shadow: inset 0 0 0px #ef4444; }
    }
    .receiving-attack { animation: pulse-red 0.5s ease-in-out; }
  </style>
</head>
<body>

  <div class="remote-container">
    <div class="game-header">
      <div class="player-info">
        <div class="name" id="my-name">PLAYER (나)</div>
        <div class="score" id="my-score">0</div>
      </div>
      <div class="player-info" style="align-items: flex-end;">
        <div class="name" id="opp-name">OPPONENT</div>
        <div class="score" id="opp-score" style="color: var(--accent);">0</div>
      </div>
    </div>

    <div class="battle-layout">
      <div class="my-board-wrap" id="body-wrap">
        <canvas id="my-canvas"></canvas>
        <div id="my-attack-notif" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-weight:900; color:#ef4444; opacity:0; pointer-events:none;">BOOM!</div>
      </div>

      <div class="opp-preview">
        <div class="label">LIVE PREVIEW</div>
        <canvas id="opp-canvas"></canvas>
      </div>

      <div class="status-msg">
        <div id="attack-alert" class="attack-alert">공격 발생!</div>
      </div>
    </div>
  </div>

  <!-- 결과 오버레이 -->
  <div id="overlay-result" class="overlay hidden">
    <h1 id="result-title">Victory!</h1>
    <p id="result-stats">상대방보다 더 오래 버텼습니다.</p>
    <div style="margin-top:2rem; display:flex; gap:1rem;">
      <button class="btn" onclick="location.href='index.html'">목록으로</button>
    </div>
  </div>

  <!-- Firebase 및 공통 SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="/games/firebase-config.js"></script>
  <script src="/games/common.js"></script>
  <script src="tetris-core.js"></script>
  <script src="online.js"></script>
</body>
</html>
