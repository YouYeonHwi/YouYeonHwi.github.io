<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="manifest" href="/games/manifest.json">

  <title>테트리스 배틀 | 커플 게임 광장</title>
  <meta name="description" content="클래식 테트리스와 박진감 넘치는 실시간 공격 배틀! 솔플부터 커플 대결까지 💕">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #a78bfa; --primary-glow: rgba(167,139,250,.35);
      --accent: #f472b6; --accent-glow: rgba(244,114,182,.3);
      --bg: #0a0a0f; --surface: rgba(255,255,255,.04);
      --border: rgba(255,255,255,.08); --text: #e2e8f0; --text-dim: #64748b;
      --radius: 20px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg);
      color: var(--text); overflow: hidden; touch-action: none;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .game-wrapper {
      display: flex; flex-direction: column; height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    /* ─── 레이아웃 모드 ─── */
    .view-solo { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; position: relative; }
    .view-local { display: flex; flex-direction: column; height: 100%; }
    
    .hidden { display: none !important; }

    /* ─── 플레이어 영역 ─── */
    .player-area {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .player-area.top { transform: rotate(180deg); border-bottom: 2px solid var(--border); }
    .player-area.bottom { border-top: 2px solid var(--border); }

    /* ─── 테트리스 보드 ─── */
    .board-container {
      position: relative; background: rgba(0,0,0,0.4);
      border: 3px solid var(--border); border-radius: 8px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      touch-action: none;
    }
    canvas { display: block; image-rendering: pixelated; }

    .score-badge {
      position: absolute; top: -30px; right: 0; font-weight: 900; color: var(--primary);
      text-shadow: 0 0 10px var(--primary-glow); font-size: 1rem;
    }

    /* ─── 오버레이 ─── */
    .overlay {
      position: fixed; inset: 0; background: rgba(10,10,15,0.96);
      backdrop-filter: blur(15px); z-index: 1000; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .overlay h1 {
      font-size: 2.5rem; font-weight: 900; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .overlay p { color: var(--text-dim); font-size: 0.9rem; margin-bottom: 2rem; max-width: 280px; }

    .menu-group { display: flex; flex-direction: column; gap: 0.8rem; width: 100%; max-width: 280px; }
    .btn {
      padding: 1rem; border-radius: 50px; border: none; font-weight: 800; font-size: 1rem;
      cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: white;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); box-shadow: 0 4px 15px var(--primary-glow); }
    .btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    /* ─── 공격 알림 ─── */
    .attack-notif {
      position: absolute; left: 50%; top: 40%; transform: translate(-50%, -50%);
      font-weight: 900; font-size: 1.5rem; color: #ef4444; pointer-events: none;
      opacity: 0; z-index: 50; white-space: nowrap;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
    }

    /* ─── 조작 안내 가이드 ─── */
    .guide-box {
      margin-top: 2rem; font-size: 0.75rem; color: var(--text-dim);
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; text-align: left;
    }
    .guide-item span { color: var(--primary); font-weight: 700; margin-right: 4px; }
  </style>
</head>
<body>

  <div class="game-wrapper">
    <!-- Solo View -->
    <div id="view-solo" class="view-solo hidden">
      <div class="board-container" id="solo-container">
        <canvas id="solo-canvas"></canvas>
        <div class="score-badge" id="solo-score">SCORE: 0</div>
        <div id="solo-attack-notif" class="attack-notif">ATTACK!</div>
      </div>
    </div>

    <!-- Local 2P View -->
    <div id="view-local" class="view-local hidden">
      <div class="player-area top" id="area-p1">
        <div class="board-container">
           <canvas id="p1-canvas"></canvas>
           <div id="p1-score" class="score-badge">0</div>
           <div id="p1-attack-notif" class="attack-notif">BOOM!</div>
        </div>
      </div>
      <div class="player-area bottom" id="area-p2">
        <div class="board-container">
           <canvas id="p2-canvas"></canvas>
           <div id="p2-score" class="score-badge">0</div>
           <div id="p2-attack-notif" class="attack-notif">BOOM!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Start Overlay -->
  <div class="overlay" id="overlay-start">
    <img src="/games/assets/shiba_mascot.png" style="width:100px; margin-bottom:1rem;" alt="Shiba">
    <h1>테트리스 배틀</h1>
    <p>블록을 쌓고 줄을 지워 상대를 공격하세요!<br>원하는 모드를 선택하세요.</p>
    
    <div class="menu-group">
      <button class="btn btn-primary" onclick="initGame('solo')">👤 1인용 (기록 도전)</button>
      <button class="btn btn-primary" onclick="initGame('local')">📱 2인용 (한 화면)</button>
      <button class="btn btn-ghost" onclick="initGame('remote')">🌐 원격 대결 (따로 플레이)</button>
      <a href="/games/" class="btn btn-ghost">← 목록으로</a>
    </div>

    <div class="guide-box">
      <div class="guide-item"><span>↔</span> 좌우 스와이프: 이동</div>
      <div class="guide-item"><span>Tap</span> 상단 터치: 회전</div>
      <div class="guide-item"><span>↓</span> 하단 스와이프: 빠른 하강</div>
      <div class="guide-item"><span>Space</span> 키보드 지원 (PC용)</div>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div class="overlay hidden" id="overlay-end">
    <h1 id="winner-text">GAME OVER</h1>
    <p id="final-stats">SCORE: 0</p>
    <div class="menu-group">
      <button class="btn btn-primary" onclick="location.reload()">🔄 다시 하기</button>
      <a href="/games/" class="btn btn-ghost">📋 목록으로</a>
    </div>
  </div>

  <script src="/games/common.js"></script>
  <script src="tetris-core.js"></script>
  <script>
    (() => {
      'use strict';
      const GAME_ID = 'tetris';
      let g1, g2;
      let activeMode = '';

      window.initGame = function(mode) {
        activeMode = mode;
        if (mode === 'remote') {
          location.href = 'online.html';
          return;
        }

        document.getElementById('overlay-start').classList.add('hidden');
        if (mode === 'solo') {
          document.getElementById('view-solo').classList.remove('hidden');
          g1 = new TetrisGame('solo-canvas', 'solo-attack-notif', null, () => finish('P1 GAME OVER'));
          g1.update();
          bindControls(g1, document.body);
        } else {
          document.getElementById('view-local').classList.remove('hidden');
          g1 = new TetrisGame('p1-canvas', 'p1-attack-notif', (a) => g2.addGarbage(a), () => finish('PLAYER 2 WIN!'));
          g2 = new TetrisGame('p2-canvas', 'p2-attack-notif', (a) => g1.addGarbage(a), () => finish('PLAYER 1 WIN!'));
          g1.update();
          g2.update();
          bindControls(g1, document.getElementById('area-p1'));
          bindControls(g2, document.getElementById('area-p2'));
        }
      }

      function bindControls(game, area) {
        let touchX, touchY, lastX;
        const moveLimit = 25;

        area.addEventListener('touchstart', e => {
          touchX = e.touches[0].clientX;
          touchY = e.touches[0].clientY;
          lastX = 0;
        });

        area.addEventListener('touchmove', e => {
          e.preventDefault();
          const dx = e.touches[0].clientX - touchX;
          const dy = e.touches[0].clientY - touchY;

          const step = Math.floor(dx / moveLimit);
          if (step !== lastX) {
            const dir = step > lastX ? 1 : -1;
            game.piece.pos.x += dir;
            if (game.collide()) game.piece.pos.x -= dir;
            lastX = step;
          }

          if (dy > moveLimit * 1.5) {
            game.drop();
            touchY = e.touches[0].clientY;
          }
        }, { passive: false });

        area.addEventListener('touchend', e => {
          const dy = e.changedTouches[0].clientY - touchY;
          const dx = e.changedTouches[0].clientX - touchX;
          if (Math.abs(dx) < 15 && Math.abs(dy) < 15) {
            game.rotate(1);
            if (typeof GameUtils !== 'undefined') GameUtils.vibrate(10);
          }
        });

        document.addEventListener('keydown', e => {
          if (game.gameOver) return;
          if (e.key === 'ArrowLeft') { game.piece.pos.x--; if(game.collide()) game.piece.pos.x++; }
          if (e.key === 'ArrowRight') { game.piece.pos.x++; if(game.collide()) game.piece.pos.x--; }
          if (e.key === 'ArrowDown') { game.drop(); }
          if (e.key === 'ArrowUp') { game.rotate(1); }
          if (e.code === 'Space') { 
            while(!game.collide()) game.piece.pos.y++;
            game.piece.pos.y--;
            game.merge(); game.spawnPiece(); game.sweep();
          }
        });
      }

      function finish(text) {
        document.getElementById('overlay-end').classList.remove('hidden');
        document.getElementById('winner-text').textContent = text;
        document.getElementById('final-stats').textContent = activeMode === 'solo' ? `SCORE: ${g1.score}` : 'BATTLE FINISHED';
      }

    })();
  </script>
  
  <style>
    @keyframes attack-float {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
      20% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); }
      80% { opacity: 1; transform: translate(-50%, -60px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -80px) scale(0.8); }
    }
  </style>

</body>
</html>
