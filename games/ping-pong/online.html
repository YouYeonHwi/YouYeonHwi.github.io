<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="google-adsense-account" content="ca-pub-2428685752915797">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2428685752915797" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>미니 핑퐁 (원격) | 커플 게임 광장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --secondary: #f472b6; --bg: #0a0a0f;
      --surface: rgba(255,255,255,.05); --text: #f8fafc;
    }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; touch-action: none; }
    
    .game-container { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot { height: 50px; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #475569; }
    
    canvas { flex: 1; width: 100%; height: 100%; background: #0a0a0f; }

    .status-overlay {
      position: absolute; top: 10px; left: 0; right: 0; text-align: center;
      pointer-events: none; z-index: 10; font-size: 0.7rem; color: rgba(255,255,255,0.3);
    }

    .result-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.96); backdrop-filter: blur(20px); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; animation: fadeIn 0.4s; }
    .result-overlay.hidden { display: none; }

    /* ═══════════════ HELP MODAL ═══════════════ */
    .overlay { position: fixed; inset: 0; background: rgba(10,10,15,.96); backdrop-filter: blur(20px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; transition: opacity .3s, visibility .3s; }
    .overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .help-content { text-align: left; max-width: 90%; max-height: 70vh; overflow-y: auto; font-size: .85rem; line-height: 1.6; color: #cbd5e1; }
    .help-content h2 { color: var(--primary); margin-bottom: .8rem; font-size: 1.2rem; }
    .help-content ul { list-style: none; margin-bottom: 1rem; }
    .help-content li { margin-bottom: .4rem; padding-left: 1.2rem; position: relative; }
    .help-content li::before { content: '•'; position: absolute; left: 0; color: var(--secondary); }
    .help-content b { color: #fff; }

    .help-btn { position: absolute; top: 1rem; right: 1rem; z-index: 20; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(10px); }
  </style>
</head>
<body>
  <div class="game-container">
    <button class="help-btn" id="btn-show-help">📜</button>
    <div class="status-overlay" id="network-status">네트워크 연동 중...</div>
    <canvas id="gameCanvas"></canvas>
  </div>

  <div class="result-overlay hidden" id="result-overlay">
    <h1 id="res-title" style="font-size:3.5rem; margin-bottom:1rem;">우리 승리!</h1>
    <p id="res-detail" style="margin-bottom:2rem; opacity:0.8; font-size:1.2rem;">점수: 5 - 3</p>
    <button onclick="location.reload()" style="padding:1rem 2.5rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:900; cursor:pointer; font-size:1.2rem;">다시 하기</button>
  </div>

  <!-- HELP OVERLAY -->
  <div class="overlay hidden" id="overlay-help">
    <h1 style="color:white; font-size:2rem; margin-bottom:1rem; font-weight:900;">🏓 게임 방법</h1>
    <div class="help-content">
      <h2>핵심 규칙</h2>
      <ul>
        <li>날아오는 탁구공을 패들로 받아쳐 상대방 진영으로 넘기세요!</li>
        <li>상대방이 공을 놓칠 때마다 득점하며, 먼저 <b>5점</b>을 획득하는 사람이 최종 승리합니다.</li>
      </ul>
      <h2>조작법</h2>
      <ul>
        <li>화면 하단(자신의 패들 영역)을 터치 또는 드래그하여 패들을 좌우로 움직입니다.</li>
        <li>실시간으로 네트워크 동기화가 이루어지므로 연결 상태가 중요합니다.</li>
      </ul>
      <h2>팁</h2>
      <ul>
        <li>패들의 모서리에 공을 맞추면 반사 각도가 커집니다. 전략적으로 활용해 보세요!</li>
      </ul>
    </div>
    <button onclick="document.getElementById('overlay-help').classList.add('hidden')" style="margin-top:1.5rem; padding:1rem 2rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">확인</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common.js"></script>
  <script src="online.js"></script>
</body>
</html>
