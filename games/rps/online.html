<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>가위바위보 (원격) | 커플 게임 광장</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #a78bfa; --accent: #f472b6; --bg: #0a0a0f; 
      --surface: rgba(255,255,255,.04); --border: rgba(255,255,255,.08); --text: #e2e8f0;
    }
    html, body {
      height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg);
      color: var(--text); overflow: hidden; touch-action: manipulation;
    }
    .game-wrapper { display: flex; flex-direction: column; height: 100dvh; }
    .ad-slot { width: 100%; min-height: 50px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: .6rem; color: #64748b; }
    
    .status-bar { padding: 1rem; text-align: center; border-bottom: 1px solid var(--border); }
    .round-info { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
    
    .player-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; position: relative; }
    .opponent { border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01); }
    
    .choice-display { font-size: 4rem; min-height: 5rem; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .choice-display.hidden-choice { filter: blur(20px); opacity: 0.3; }
    
    .choice-grid { display: flex; gap: 1rem; margin-top: 1rem; }
    .choice-btn {
      width: 70px; height: 70px; border-radius: 20px; border: 2px solid var(--border);
      background: var(--surface); font-size: 2rem; cursor: pointer; transition: all 0.2s;
    }
    .choice-btn:active { transform: scale(0.9); }
    .choice-btn.selected { border-color: var(--primary); background: rgba(167,139,250,0.1); box-shadow: 0 0 15px rgba(167,139,250,0.3); }
    .choice-btn.disabled { opacity: 0.3; pointer-events: none; }

    .result-overlay { position: fixed; inset: 0; background: rgba(10,10,15,0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.4s; }
    .result-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="ad-slot">AD · TOP</div>
    
    <!-- Opponent Area -->
    <div class="player-section opponent">
      <div style="font-size:0.7rem; color:#64748b; margin-bottom:0.5rem;">상대방</div>
      <div class="choice-display" id="opp-choice">❔</div>
      <div id="opp-status" style="font-size:0.8rem; color:var(--primary);">상대방 기다리는 중...</div>
    </div>

    <!-- Status -->
    <div class="status-bar">
      <div class="round-info" id="round-text">ROUND 1</div>
      <div style="display:flex; justify-content:center; gap:2rem; margin-top:0.5rem; font-weight:800;">
        <span style="color:var(--accent)" id="my-score">나: 0</span>
        <span style="color:var(--primary)" id="opp-score">상대: 0</span>
      </div>
    </div>

    <!-- My Area -->
    <div class="player-section">
      <div class="choice-display" id="my-choice">❔</div>
      <div class="choice-grid" id="my-choices">
        <button class="choice-btn" data-choice="scissors">✌️</button>
        <button class="choice-btn" data-choice="rock">✊</button>
        <button class="choice-btn" data-choice="paper">🖐️</button>
      </div>
      <div style="margin-top:1rem; font-size:0.7rem; color:#64748b;">당신의 선택</div>
    </div>

    <div class="ad-slot">AD · BOTTOM</div>
  </div>

  <div class="result-overlay hidden" id="result-overlay">
    <h1 id="result-title" style="font-size:3rem; margin-bottom:1rem;">패배...</h1>
    <p id="result-detail" style="margin-bottom:2rem;">상대방이 바위를 냈습니다.</p>
    <button onclick="location.reload()" style="padding:1rem 2rem; border-radius:50px; background:var(--primary); color:white; border:none; font-weight:800; cursor:pointer;">다시 하기 / 방 나가기</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../firebase-config.js"></script>
  <script src="../common.js"></script>
  <script src="online.js"></script>
</body>
</html>
